                                        );
                                    }) : (
                                        <tr><td colSpan="6" className="empty-state">
                                            <i className="fa-solid fa-inbox"></i>
                                            <p>ไม่มีข้อมูลลูกค้า</p>
                                            <p style={{ fontSize: '13px' }}>เริ่มต้นด้วยการเพิ่มลูกค้าใหม่</p>
                                        </td></tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        // ==================== CUSTOMERS PAGE ====================
        const CustomersPage = () => {
            const { customers, user, callAPI, fetchCustomers, showToast } = useApp();
            const isAdmin = user?.rank === 1;
            const [search, setSearch] = useState('');
            const [showModal, setShowModal] = useState(false);
            const [editingCustomer, setEditingCustomer] = useState(null);
            const [form, setForm] = useState({
                email: '', accountName: '', package: '1 เดือน', storeName: user?.storeName || '',
                houseHead: '', purchaseDate: '', expiryDate: '', notificationEmail: user?.notificationEmail || '',
            });

            const filteredCustomers = (isAdmin ? customers : customers.filter(c => c.storeName === user?.storeName))
                .filter(c =>
                    c.email?.toLowerCase().includes(search.toLowerCase()) ||
                    c.accountName?.toLowerCase().includes(search.toLowerCase()) ||
                    c.storeName?.toLowerCase().includes(search.toLowerCase())
                );

            const openAdd = () => {
                setEditingCustomer(null);
                setForm({
                    email: '', accountName: '', package: '1 เดือน', storeName: user?.storeName || '',
                    houseHead: '', purchaseDate: '', expiryDate: '', notificationEmail: user?.notificationEmail || '',
                });
                setShowModal(true);
            };

            const openEdit = (customer) => {
                setEditingCustomer(customer);
                setForm({
                    email: customer.email || '',
                    accountName: customer.accountName || '',
                    package: customer.package || '1 เดือน',
                    storeName: customer.storeName || '',
                    houseHead: customer.houseHead || '',
                    purchaseDate: customer.purchaseDate || '',
                    expiryDate: customer.expiryDate || '',
                    notificationEmail: customer.notificationEmail || '',
                });
                setShowModal(true);
            };

            const handleSubmit = async () => {
                if (!form.email || !form.accountName) {
                    showToast('กรุณากรอกอีเมลและชื่อบัญชี', 'danger');
                    return;
                }
                try {
                    if (editingCustomer) {
                        await callAPI('updateCustomer', {
                            ...form,
                            id: editingCustomer.id || editingCustomer._id
                        });
                        showToast('อัปเดตข้อมูลสำเร็จ', 'success');
                    } else {
                        await callAPI('addCustomer', form);
                        showToast('เพิ่มลูกค้าสำเร็จ', 'success');
                    }
                    setShowModal(false);
                    await fetchCustomers();
                } catch (e) {
                    showToast('เกิดข้อผิดพลาด: ' + e.message, 'danger');
                }
            };

            const handleDelete = async (customer) => {
                if (!confirm(`⚠️ ต้องการลบลูกค้า "${customer.email}" ใช่หรือไม่?\nการกระทำนี้ไม่สามารถย้อนกลับได้`)) return;
                try {
                    await callAPI('deleteCustomer', { id: customer.id || customer._id });
                    showToast('ลบข้อมูลสำเร็จ', 'success');
                    await fetchCustomers();
                } catch (e) {
                    showToast('เกิดข้อผิดพลาด', 'danger');
                }
            };

            const daysRemaining = (expiryDate) => {
                if (!expiryDate) return '-';
                try {
                    return Math.ceil((new Date(expiryDate) - new Date()) / (1000 * 60 * 60 * 24));
                } catch (e) {
                    return '-';
                }
            };

            return (
                <div>
                    <div className="top-bar">
                        <h1 className="page-title">
                            <span className="icon">👥</span> จัดการลูกค้า
                        </h1>
                        <div style={{ display: 'flex', gap: '10px' }}>
                            <span className="badge badge-info" style={{ fontSize: '13px' }}>
                                <i className="fa-solid fa-list"></i> {filteredCustomers.length} รายการ
                            </span>
                            <button className="btn btn-primary" onClick={openAdd}>
                                <i className="fa-solid fa-plus"></i> เพิ่มลูกค้า
                            </button>
                        </div>
                    </div>

                    <div className="search-box">
                        <i className="fa-solid fa-magnifying-glass search-icon"></i>
                        <input
                            className="input-field"
                            placeholder="🔍 ค้นหาด้วยอีเมล, ชื่อบัญชี, ร้านค้า..."
                            value={search}
                            onChange={e => setSearch(e.target.value)}
                        />
                    </div>

                    <div className="glass-card">
                        <div className="table-wrapper">
                            <table>
                                <thead>
                                    <tr>
                                        <th><i className="fa-solid fa-envelope"></i> อีเมล</th>
                                        <th><i className="fa-solid fa-user"></i> ชื่อบัญชี</th>
                                        <th><i className="fa-solid fa-box"></i> แพ็คเกจ</th>
                                        <th><i className="fa-solid fa-store"></i> ร้านค้า</th>
                                        <th><i className="fa-solid fa-house"></i> หัวบ้าน</th>
                                        <th><i className="fa-solid fa-calendar-plus"></i> วันที่ซื้อ</th>
                                        <th><i className="fa-solid fa-calendar-xmark"></i> วันที่หมดอายุ</th>
                                        <th><i className="fa-solid fa-hourglass-half"></i> คงเหลือ</th>
                                        <th><i className="fa-solid fa-gear"></i> จัดการ</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filteredCustomers.length > 0 ? filteredCustomers.map((c, i) => {
                                        const remaining = daysRemaining(c.expiryDate);
                                        return (
                                            <tr key={i}>
                                                <td>
                                                    <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                                                        <div style={{
                                                            width: '32px', height: '32px', borderRadius: '50%',
                                                            background: 'var(--active-bg)', display: 'flex',
                                                            alignItems: 'center', justifyContent: 'center',
                                                            fontSize: '13px', fontWeight: 600
                                                        }}>
                                                            {c.email?.charAt(0).toUpperCase() || '?'}
                                                        </div>
                                                        <span style={{ fontSize: '13px' }}>{c.email}</span>
                                                    </div>
                                                </td>
                                                <td><strong>{c.accountName}</strong></td>
                                                <td><span className="badge badge-info">{c.package}</span></td>
                                                <td><span className="badge" style={{ background: 'var(--hover-bg)' }}>{c.storeName}</span></td>
                                                <td>{c.houseHead || <span style={{ color: 'var(--text-tertiary)' }}>-</span>}</td>
                                                <td>{c.purchaseDate || '-'}</td>
                                                <td>{c.expiryDate || '-'}</td>
                                                <td>
                                                    {remaining !== '-' ? (
                                                        <span className={`badge ${remaining <= 2 ? 'badge-danger' : remaining <= 7 ? 'badge-warning' : 'badge-success'}`}>
                                                            {remaining <= 2 && <i className="fa-solid fa-exclamation-triangle"></i>}
                                                            {remaining} วัน
                                                        </span>
                                                    ) : <span style={{ color: 'var(--text-tertiary)' }}>-</span>}
                                                </td>
                                                <td>
                                                    <div style={{ display: 'flex', gap: '6px' }}>
                                                        <button
                                                            className="btn btn-secondary btn-sm"
                                                            onClick={() => openEdit(c)}
                                                            title="แก้ไข"
                                                        >
                                                            <i className="fa-solid fa-pen-to-square"></i>
                                                        </button>
                                                        <button
                                                            className="btn btn-danger btn-sm"
                                                            onClick={() => handleDelete(c)}
                                                            title="ลบ"
                                                        >
                                                            <i className="fa-solid fa-trash-can"></i>
                                                        </button>
                                                    </div>
                                                </td>
                                            </tr>
                                        );
                                    }) : (
                                        <tr><td colSpan="9" className="empty-state">
                                            <i className="fa-solid fa-inbox"></i>
                                            <p>ไม่พบข้อมูลลูกค้า</p>
                                            <p style={{ fontSize: '13px' }}>ลองเปลี่ยนคำค้นหาหรือเพิ่มลูกค้าใหม่</p>
                                        </td></tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {showModal && (
                        <div className="modal-overlay" onClick={() => setShowModal(false)}>
                            <div className="modal" onClick={e => e.stopPropagation()}>
                                <h2>
                                    <i className={`fa-solid ${editingCustomer ? 'fa-pen-to-square' : 'fa-plus-circle'}`}></i>
                                    {editingCustomer ? 'แก้ไขข้อมูลลูกค้า' : 'เพิ่มลูกค้าใหม่'}
                                </h2>
                                <div className="grid-2">
                                    <div className="input-group">
                                        <label><i className="fa-solid fa-envelope"></i> อีเมล *</label>
                                        <input
                                            className="input-field"
                                            type="email"
                                            value={form.email}
                                            onChange={e => setForm({ ...form, email: e.target.value })}
                                            placeholder="example@email.com"
                                        />
                                    </div>
                                    <div className="input-group">
                                        <label><i className="fa-solid fa-user"></i> ชื่อบัญชี *</label>
                                        <input
                                            className="input-field"
                                            value={form.accountName}
                                            onChange={e => setForm({ ...form, accountName: e.target.value })}
                                            placeholder="ชื่อบัญชี YouTube"
                                        />
                                    </div>
                                    <div className="input-group">
                                        <label><i className="fa-solid fa-box"></i> แพ็คเกจ</label>
                                        <select
                                            className="input-field"
                                            value={form.package}
                                            onChange={e => setForm({ ...form, package: e.target.value })}
                                        >
                                            <option value="1 เดือน">1 เดือน</option>
                                            <option value="2 เดือน">2 เดือน</option>
                                            <option value="3 เดือน">3 เดือน</option>
                                            <option value="4 เดือน">4 เดือน</option>
                                            <option value="5 เดือน">5 เดือน</option>
                                            <option value="6 เดือน">6 เดือน</option>
                                            <option value="7 เดือน">7 เดือน</option>
                                            <option value="8 เดือน">8 เดือน</option>
                                            <option value="9 เดือน">9 เดือน</option>
                                            <option value="10 เดือน">10 เดือน</option>
                                            <option value="11 เดือน">11 เดือน</option>
                                            <option value="12 เดือน">12 เดือน</option>
                                        </select>
                                    </div>
                                    <div className="input-group">
                                        <label><i className="fa-solid fa-store"></i> ร้านค้า</label>
                                        <input
                                            className="input-field"
                                            value={form.storeName}
                                            onChange={e => setForm({ ...form, storeName: e.target.value })}
                                            disabled={!isAdmin}
                                        />
                                    </div>
                                    <div className="input-group">
                                        <label><i className="fa-solid fa-house"></i> หัวบ้าน</label>
                                        <input
                                            className="input-field"
                                            value={form.houseHead}
                                            onChange={e => setForm({ ...form, houseHead: e.target.value })}
                                            placeholder="ชื่อหัวบ้าน (ถ้ามี)"
                                        />
                                    </div>
                                    <div className="input-group">
                                        <label><i className="fa-solid fa-calendar-plus"></i> วันที่ซื้อ</label>
                                        <input
                                            className="input-field"
                                            type="date"
                                            value={form.purchaseDate}
                                            onChange={e => setForm({ ...form, purchaseDate: e.target.value })}
                                        />
                                    </div>
                                    <div className="input-group">
                                        <label><i className="fa-solid fa-calendar-xmark"></i> วันที่หมดอายุ</label>
                                        <input
                                            className="input-field"
                                            type="date"
                                            value={form.expiryDate}
                                            onChange={e => setForm({ ...form, expiryDate: e.target.value })}
                                        />
                                    </div>
                                    <div className="input-group">
                                        <label><i className="fa-solid fa-bell"></i> อีเมลแจ้งเตือน</label>
                                        <input
                                            className="input-field"
                                            type="email"
                                            value={form.notificationEmail}
                                            onChange={e => setForm({ ...form, notificationEmail: e.target.value })}
                                            placeholder="email@example.com"
                                        />
                                    </div>
                                </div>
                                <div className="modal-actions">
                                    <button className="btn btn-secondary" onClick={() => setShowModal(false)}>
                                        <i className="fa-solid fa-xmark"></i> ยกเลิก
                                    </button>
                                    <button className="btn btn-primary" onClick={handleSubmit}>
                                        <i className={`fa-solid fa-${editingCustomer ? 'check' : 'plus'}`}></i>
                                        {editingCustomer ? 'บันทึกการแก้ไข' : 'เพิ่มลูกค้า'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ==================== CHECK PAGE ====================
        const CheckPage = () => {
            const { customers, user } = useApp();
            const isAdmin = user?.rank === 1;
            const [searchEmail, setSearchEmail] = useState('');
            const [result, setResult] = useState(null);
            const [searched, setSearched] = useState(false);
            const [searching, setSearching] = useState(false);

            const handleSearch = () => {
                if (!searchEmail.trim()) {
                    return;
                }

                setSearching(true);
                setSearched(false);

                // จำลองการค้นหา (ใช้ข้อมูลที่มีอยู่แล้ว)
                setTimeout(() => {
                    const filtered = isAdmin ? customers : customers.filter(c => c.storeName === user?.storeName);
                    const found = filtered.find(c =>
                        c.email?.toLowerCase() === searchEmail.toLowerCase()
                    );
                    setResult(found || null);
                    setSearched(true);
                    setSearching(false);
                }, 300);
            };

            const daysRemaining = (expiryDate) => {
                if (!expiryDate) return null;
                try {
                    return Math.ceil((new Date(expiryDate) - new Date()) / (1000 * 60 * 60 * 24));
                } catch (e) {
                    return null;
                }
            };

            return (
                <div>
                    <h1 className="page-title" style={{ marginBottom: '28px' }}>
                        <span className="icon">🔍</span> เช็คข้อมูล
                    </h1>
                    <div className="glass-card" style={{ maxWidth: '640px', margin: '0 auto' }}>
                        <div className="search-box">
                            <i className="fa-solid fa-envelope search-icon"></i>
                            <input
                                className="input-field"
                                type="email"
                                placeholder="กรอกอีเมลเพื่อค้นหาข้อมูลลูกค้า..."
                                value={searchEmail}
                                onChange={e => setSearchEmail(e.target.value)}
                                onKeyDown={e => e.key === 'Enter' && handleSearch()}
                            />
                        </div>
                        <button
                            className="btn btn-primary"
                            onClick={handleSearch}
                            style={{ width: '100%', justifyContent: 'center', borderRadius: '50px', padding: '16px' }}
                            disabled={searching}
                        >
                            {searching ? (
                                <>
                                    <div className="spinner" style={{ width: '18px', height: '18px', borderWidth: '2px' }}></div>
                                    กำลังค้นหา...
                                </>
                            ) : (
                                <>
                                    <i className="fa-solid fa-magnifying-glass"></i> ค้นหาข้อมูล
                                </>
                            )}
                        </button>

                        {searched && (
                            <div style={{ marginTop: '28px' }}>
                                {result ? (
                                    <div className="neo-card" style={{ animation: 'slideUp 0.3s ease' }}>
                                        <h3 style={{ marginBottom: '20px', display: 'flex', alignItems: 'center', gap: '10px', color: 'var(--success)' }}>
                                            <i className="fa-solid fa-circle-check"></i>
                                            พบข้อมูลลูกค้า
                                        </h3>
                                        <table style={{ width: '100%' }}>
                                            <tbody>
                                                <tr>
                                                    <td style={{ fontWeight: 600, padding: '10px 0', color: 'var(--text-secondary)', width: '140px' }}>
                                                        <i className="fa-solid fa-envelope"></i> อีเมล
                                                    </td>
                                                    <td style={{ fontWeight: 500 }}>{result.email}</td>
                                                </tr>
                                                <tr>
                                                    <td style={{ fontWeight: 600, padding: '10px 0', color: 'var(--text-secondary)' }}>
                                                        <i className="fa-solid fa-user"></i> ชื่อบัญชี
                                                    </td>
                                                    <td><strong>{result.accountName}</strong></td>
                                                </tr>
                                                <tr>
                                                    <td style={{ fontWeight: 600, padding: '10px 0', color: 'var(--text-secondary)' }}>
                                                        <i className="fa-solid fa-box"></i> แพ็คเกจ
                                                    </td>
                                                    <td><span className="badge badge-info">{result.package}</span></td>
                                                </tr>
                                                <tr>
                                                    <td style={{ fontWeight: 600, padding: '10px 0', color: 'var(--text-secondary)' }}>
                                                        <i className="fa-solid fa-calendar-plus"></i> วันที่เริ่มใช้งาน
                                                    </td>
                                                    <td>{result.purchaseDate || '-'}</td>
                                                </tr>
                                                <tr>
                                                    <td style={{ fontWeight: 600, padding: '10px 0', color: 'var(--text-secondary)' }}>
                                                        <i className="fa-solid fa-calendar-xmark"></i> วันที่หมดอายุ
                                                    </td>
                                                    <td><strong>{result.expiryDate || '-'}</strong></td>
                                                </tr>
                                                <tr>
                                                    <td style={{ fontWeight: 600, padding: '10px 0', color: 'var(--text-secondary)' }}>
                                                        <i className="fa-solid fa-circle"></i> สถานะ
                                                    </td>
                                                    <td>
                                                        {(() => {
                                                            const remaining = daysRemaining(result.expiryDate);
                                                            if (remaining === null)
                                                                return <span className="badge badge-warning"><span className="status-dot expiring"></span> ไม่ระบุ</span>;
                                                            if (remaining < 0)
                                                                return <span className="badge badge-danger"><span className="status-dot expired"></span> หมดอายุแล้ว</span>;
                                                            if (remaining <= 2)
                                                                return <span className="badge badge-danger"><span className="status-dot expired"></span> ⚠️ ใกล้หมดอายุ (เหลือ {remaining} วัน)</span>;
                                                            if (remaining <= 7)
                                                                return <span className="badge badge-warning"><span className="status-dot expiring"></span> เหลือ {remaining} วัน</span>;
                                                            return <span className="badge badge-success"><span className="status-dot active"></span> ✅ ใช้งานได้ (เหลือ {remaining} วัน)</span>;
                                                        })()}
                                                    </td>
                                                </tr>
                                                <tr>
                                                    <td style={{ fontWeight: 600, padding: '10px 0', color: 'var(--text-secondary)' }}>
                                                        <i className="fa-solid fa-store"></i> ร้านค้า
                                                    </td>
                                                    <td><span className="badge" style={{ background: 'var(--hover-bg)' }}>{result.storeName}</span></td>
                                                </tr>
                                                <tr>
                                                    <td style={{ fontWeight: 600, padding: '10px 0', color: 'var(--text-secondary)' }}>
                                                        <i className="fa-solid fa-house"></i> หัวบ้าน
                                                    </td>
                                                    <td>{result.houseHead || <span style={{ color: 'var(--text-tertiary)' }}>-</span>}</td>
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>
                                ) : (
                                    <div className="empty-state" style={{ animation: 'slideUp 0.3s ease' }}>
                                        <i className="fa-solid fa-circle-exclamation" style={{ color: 'var(--warning)' }}></i>
                                        <p style={{ fontWeight: 600, color: 'var(--text-primary)' }}>ไม่พบข้อมูล</p>
                                        <p style={{ color: 'var(--text-secondary)', marginTop: '4px' }}>
                                            ไม่พบลูกค้าที่ใช้อีเมล "{searchEmail}"
                                        </p>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // ==================== PROFILE PAGE ====================
        const ProfilePage = () => {
            const { user, logout } = useApp();
            return (
                <div>
                    <h1 className="page-title" style={{ marginBottom: '28px' }}>
                        <span className="icon">👤</span> โปรไฟล์
                    </h1>
                    <div className="glass-card" style={{ maxWidth: '540px' }}>
                        <div style={{ textAlign: 'center', marginBottom: '32px' }}>
                            <div className="user-avatar" style={{
                                width: '100px', height: '100px', margin: '0 auto 20px',
                                fontSize: '40px', borderWidth: '3px'
                            }}>
                                {user?.pictureUrl ? (
                                    <img
                                        src={user.pictureUrl}
                                        alt=""
                                        style={{ width: '100%', height: '100%', objectFit: 'cover' }}
                                        onError={(e) => {
                                            e.target.style.display = 'none';
                                            const fallback = e.target.parentNode.querySelector('.avatar-fallback');
                                            if (fallback) fallback.style.display = 'flex';
                                        }}
                                    />
                                ) : null}
                                <i className="fa-solid fa-user avatar-fallback" style={{ display: user?.pictureUrl ? 'none' : 'block' }}></i>
                            </div>
                            <h2 style={{ fontSize: '22px' }}>{user?.lineName || 'ผู้ใช้งาน'}</h2>
                            <div style={{ marginTop: '8px' }}>
                                {user?.rank === 1 ? (
                                    <span className="badge badge-danger" style={{ fontSize: '13px', padding: '8px 16px' }}>
                                        <i className="fa-solid fa-crown"></i> แอดมิน
                                    </span>
                                ) : (
                                    <span className="badge badge-info" style={{ fontSize: '13px', padding: '8px 16px' }}>
                                        <i className="fa-solid fa-user"></i> สมาชิก
                                    </span>
                                )}
                            </div>
                        </div>
                        <table style={{ width: '100%' }}>
                            <tbody>
                                <tr>
                                    <td style={{ fontWeight: 600, padding: '12px 0', color: 'var(--text-secondary)', width: '150px' }}>
                                        <i className="fa-solid fa-id-card"></i> ชื่อไลน์
                                    </td>
                                    <td style={{ fontWeight: 500 }}>{user?.lineName || '-'}</td>
                                </tr>
                                <tr>
                                    <td style={{ fontWeight: 600, padding: '12px 0', color: 'var(--text-secondary)' }}>
                                        <i className="fa-solid fa-store"></i> ร้านค้า
                                    </td>
                                    <td><span className="badge" style={{ background: 'var(--hover-bg)' }}>{user?.storeName || '-'}</span></td>
                                </tr>
                                <tr>
                                    <td style={{ fontWeight: 600, padding: '12px 0', color: 'var(--text-secondary)' }}>
                                        <i className="fa-solid fa-fingerprint"></i> LINE User ID
                                    </td>
                                    <td style={{ fontFamily: 'var(--font-mono)', fontSize: '12px' }}>
                                        {user?.userId || user?.id || '-'}
                                    </td>
                                </tr>
                                <tr>
                                    <td style={{ fontWeight: 600, padding: '12px 0', color: 'var(--text-secondary)' }}>
                                        <i className="fa-solid fa-calendar-check"></i> วันที่สมัคร
                                    </td>
                                    <td>{user?.createdAt ? new Date(user.createdAt).toLocaleDateString('th-TH', {
                                        year: 'numeric', month: 'long', day: 'numeric'
                                    }) : '-'}</td>
                                </tr>
                                <tr>
                                    <td style={{ fontWeight: 600, padding: '12px 0', color: 'var(--text-secondary)' }}>
                                        <i className="fa-solid fa-clock-rotate-left"></i> เข้าสู่ระบบล่าสุด
                                    </td>
                                    <td>{user?.lastLogin ? new Date(user.lastLogin).toLocaleString('th-TH') : '-'}</td>
                                </tr>
                            </tbody>
                        </table>
                        <div style={{ marginTop: '32px', textAlign: 'center', paddingTop: '20px', borderTop: '1px solid var(--border-color)' }}>
                            <button className="btn btn-danger" onClick={logout} style={{ borderRadius: '50px', padding: '14px 32px' }}>
                                <i className="fa-solid fa-right-from-bracket"></i> ออกจากระบบ
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // ==================== USERS PAGE (ADMIN) ====================
        const UsersPage = () => {
            const { users, callAPI, fetchUsers, showToast, user: currentUser } = useApp();
            const [showModal, setShowModal] = useState(false);
            const [editingUser, setEditingUser] = useState(null);
            const [form, setForm] = useState({ lineName: '', storeName: '', rank: 0 });

            const openEdit = (u) => {
                setEditingUser(u);
                setForm({
                    lineName: u.lineName || '',
                    storeName: u.storeName || '',
                    rank: parseInt(u.rank) || 0
                });
                setShowModal(true);
            };

            const handleSave = async () => {
                try {
                    if (editingUser) {
                        await callAPI('updateUser', {
                            ...form,
                            id: editingUser.id || editingUser._id
                        });
                        showToast('อัปเดตผู้ใช้สำเร็จ', 'success');
                    }
                    setShowModal(false);
                    await fetchUsers();
                } catch (e) {
                    showToast('เกิดข้อผิดพลาด: ' + e.message, 'danger');
                }
            };

            const handleDelete = async (u) => {
                if (u.id === currentUser?.id) {
                    showToast('ไม่สามารถลบบัญชีตัวเองได้', 'danger');
                    return;
                }
                if (!confirm(`⚠️ ต้องการลบผู้ใช้ "${u.lineName}" ใช่หรือไม่?\nการกระทำนี้ไม่สามารถย้อนกลับได้`)) return;
                try {
                    await callAPI('deleteUser', { id: u.id || u._id });
                    showToast('ลบผู้ใช้สำเร็จ', 'success');
                    await fetchUsers();
                } catch (e) {
                    showToast('เกิดข้อผิดพลาด: ' + e.message, 'danger');
                }
            };

            return (
                <div>
                    <div className="top-bar">
                        <h1 className="page-title">
                            <span className="icon">🛡️</span> จัดการผู้ใช้
                        </h1>
                        <span className="badge" style={{ background: 'var(--hover-bg)', fontSize: '13px' }}>
                            <i className="fa-solid fa-users"></i> {users.length} ผู้ใช้
                        </span>
                    </div>
                    <div className="glass-card">
                        <div className="table-wrapper">
                            <table>
                                <thead>
                                    <tr>
                                        <th><i className="fa-solid fa-user"></i> ชื่อไลน์</th>
                                        <th><i className="fa-solid fa-store"></i> ชื่อร้านค้า</th>
                                        <th><i className="fa-solid fa-shield"></i> ระดับ</th>
                                        <th><i className="fa-solid fa-calendar-plus"></i> วันที่สร้าง</th>
                                        <th><i className="fa-solid fa-clock"></i> เข้าสู่ระบบล่าสุด</th>
                                        <th><i className="fa-solid fa-gear"></i> จัดการ</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {users.length > 0 ? users.map((u, i) => (
                                        <tr key={i} style={u.id === currentUser?.id ? { background: 'var(--hover-bg)' } : {}}>
                                            <td>
                                                <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                                                    <div className="user-avatar" style={{ width: '36px', height: '36px', fontSize: '14px' }}>
                                                        {u.pictureUrl ? (
                                                            <img
                                                                src={u.pictureUrl}
                                                                alt=""
                                                                onError={(e) => { e.target.style.display = 'none'; }}
                                                            />
                                                        ) : (
                                                            <i className="fa-solid fa-user"></i>
                                                        )}
                                                    </div>
                                                    <div>
                                                        <div style={{ fontWeight: 600 }}>{u.lineName}</div>
                                                        {u.id === currentUser?.id && (
                                                            <span style={{ fontSize: '10px', color: 'var(--accent)' }}>คุณ</span>
                                                        )}
                                                    </div>
                                                </div>
                                            </td>
                                            <td><span className="badge" style={{ background: 'var(--hover-bg)' }}>{u.storeName}</span></td>
                                            <td>
                                                {u.rank === 1 ? (
                                                    <span className="badge badge-danger">
                                                        <i className="fa-solid fa-crown"></i> แอดมิน
                                                    </span>
                                                ) : (
                                                    <span className="badge badge-info">
                                                        <i className="fa-solid fa-user"></i> สมาชิก
                                                    </span>
                                                )}
                                            </td>
                                            <td>{u.createdAt ? new Date(u.createdAt).toLocaleDateString('th-TH') : '-'}</td>
                                            <td>{u.lastLogin ? new Date(u.lastLogin).toLocaleString('th-TH') : '-'}</td>
                                            <td>
                                                <div style={{ display: 'flex', gap: '6px' }}>
                                                    <button
                                                        className="btn btn-secondary btn-sm"
                                                        onClick={() => openEdit(u)}
                                                        title="แก้ไข"
                                                    >
                                                        <i className="fa-solid fa-pen-to-square"></i>
                                                    </button>
                                                    <button
                                                        className="btn btn-danger btn-sm"
                                                        onClick={() => handleDelete(u)}
                                                        disabled={u.id === currentUser?.id}
                                                        title={u.id === currentUser?.id ? 'ไม่สามารถลบตัวเองได้' : 'ลบ'}
                                                    >
                                                        <i className="fa-solid fa-trash-can"></i>
                                                    </button>
                                                </div>
                                            </td>
                                        </tr>
                                    )) : (
                                        <tr><td colSpan="6" className="empty-state">
                                            <i className="fa-solid fa-users-slash"></i>
                                            <p>ไม่มีข้อมูลผู้ใช้</p>
                                        </td></tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {showModal && (
                        <div className="modal-overlay" onClick={() => setShowModal(false)}>
                            <div className="modal" onClick={e => e.stopPropagation()}>
                                <h2><i className="fa-solid fa-pen-to-square"></i> แก้ไขผู้ใช้</h2>
                                <div className="input-group">
                                    <label><i className="fa-solid fa-id-card"></i> ชื่อไลน์</label>
                                    <input
                                        className="input-field"
                                        value={form.lineName}
                                        onChange={e => setForm({ ...form, lineName: e.target.value })}
                                    />
                                </div>
                                <div className="input-group">
                                    <label><i className="fa-solid fa-store"></i> ชื่อร้านค้า</label>
                                    <input
                                        className="input-field"
                                        value={form.storeName}
                                        onChange={e => setForm({ ...form, storeName: e.target.value })}
                                    />
                                </div>
                                <div className="input-group">
                                    <label><i className="fa-solid fa-shield"></i> ระดับ</label>
                                    <select
                                        className="input-field"
                                        value={form.rank}
                                        onChange={e => setForm({ ...form, rank: parseInt(e.target.value) })}
                                    >
                                        <option value={0}>👤 สมาชิก</option>
                                        <option value={1}>👑 แอดมิน</option>
                                    </select>
                                </div>
                                <div className="modal-actions">
                                    <button className="btn btn-secondary" onClick={() => setShowModal(false)}>
                                        <i className="fa-solid fa-xmark"></i> ยกเลิก
                                    </button>
                                    <button className="btn btn-primary" onClick={handleSave}>
                                        <i className="fa-solid fa-check"></i> บันทึก
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ==================== MAIN APP ====================
        const App = () => {
            const {
                user, theme, loading, currentPage, sidebarOpen, setSidebarOpen, toggleTheme
            } = useApp();

            if (loading) return <LoadingScreen />;

            if (!user) {
                return (
                    <div data-theme={theme}>
                        <LoginPage />
                        <Toast />
                        <DebugPanel />
                        <button className="theme-toggle" onClick={toggleTheme} title="เปลี่ยนธีม">
                            <i className={`fa-solid fa-${theme === 'dark' ? 'sun' : 'moon'}`}></i>
                        </button>
                    </div>
                );
            }

            const renderPage = () => {
                switch (currentPage) {
                    case 'dashboard': return <Dashboard />;
                    case 'customers': return <CustomersPage />;
                    case 'check': return <CheckPage />;
                    case 'profile': return <ProfilePage />;
                    case 'users': return user.rank === 1 ? <UsersPage /> : <Dashboard />;
                    default: return <Dashboard />;
                }
            };

            return (
                <div data-theme={theme}>
                    <div className="app-container">
                        {sidebarOpen && (
                            <div
                                onClick={() => setSidebarOpen(false)}
                                style={{
                                    position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.6)',
                                    backdropFilter: 'blur(4px)', zIndex: 99
                                }}
                            />
                        )}

                        <Sidebar />

                        <main className="main-content">
                            <div className="mobile-menu-btn" onClick={() => setSidebarOpen(true)} style={{ marginBottom: '20px' }}>
                                <i className="fa-solid fa-bars"></i>
                            </div>
                            {renderPage()}
                        </main>

                        <BottomNav />
                    </div>
                    <Toast />
                    <DebugPanel />
                    <button className="theme-toggle" onClick={toggleTheme} title="เปลี่ยนธีม">
                        <i className={`fa-solid fa-${theme === 'dark' ? 'sun' : 'moon'}`}></i>
                    </button>
                </div>
            );
        };

        // ==================== RENDER ====================
        addDebugLog('=== Starting React App ===', 'info');
        addDebugLog(`LIFF ID: ${LIFF_ID}`, 'info');
        addDebugLog(`API URL: ${APPS_SCRIPT_URL}`, 'info');
        addDebugLog(`Theme: dark mode`, 'info');

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <AppProvider>
                <App />
            </AppProvider>
        );

        addDebugLog('=== React App Rendered ===', 'success');
    </script>
</body>

</html>
