                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: {
                                    position: 'bottom',
                                    labels: {
                                        color: isDark ? '#cbd5e1' : '#475569',
                                        padding: 16,
                                        usePointStyle: true,
                                        font: { size: 11 }
                                    }
                                }
                            }
                        }
                    });
                }

                return () => {
                    if (barInstance.current) barInstance.current.destroy();
                    if (pieInstance.current) pieInstance.current.destroy();
                };
            }, [stats, loading]);

            const daysRemaining = (expiryDate) => {
                if (!expiryDate) return null;
                try {
                    return Math.ceil((new Date(expiryDate) - new Date()) / (1000 * 60 * 60 * 24));
                } catch (e) { return null; }
            };

            const getStatusBadge = (remaining) => {
                if (remaining === null) return { className: 'badge-neutral', text: 'ไม่ระบุ' };
                if (remaining < 0) return { className: 'badge-danger', text: 'หมดอายุ' };
                if (remaining <= 2) return { className: 'badge-danger', text: `⚠️ เหลือ ${remaining} วัน` };
                if (remaining <= 7) return { className: 'badge-warning', text: `เหลือ ${remaining} วัน` };
                return { className: 'badge-success', text: `✅ ${remaining} วัน` };
            };

            if (loading) {
                return (
                    <div>
                        <div className="top-bar">
                            <h1 className="page-title"><span className="icon"><i className="fa-solid fa-chart-pie"></i></span> แดชบอร์ด</h1>
                        </div>
                        <div className="glass-card">
                            <div className="loading-spinner">
                                <div className="spinner"></div>
                                <p className="text-muted">กำลังโหลดข้อมูล...</p>
                            </div>
                        </div>
                    </div>
                );
            }

            if (!stats) {
                return (
                    <div>
                        <div className="top-bar">
                            <h1 className="page-title"><span className="icon"><i className="fa-solid fa-chart-pie"></i></span> แดชบอร์ด</h1>
                        </div>
                        <div className="glass-card">
                            <div className="empty-state">
                                <i className="fa-solid fa-circle-exclamation"></i>
                                <p>ไม่สามารถโหลดข้อมูลได้</p>
                                <button className="btn btn-secondary btn-sm" style={{ marginTop: '1rem' }} onClick={fetchStats}>
                                    <i className="fa-solid fa-rotate"></i> ลองใหม่
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div>
                    <div className="top-bar">
                        <h1 className="page-title">
                            <span className="icon"><i className="fa-solid fa-chart-pie"></i></span> แดชบอร์ด
                        </h1>
                        <div style={{ display: 'flex', gap: '0.75rem', alignItems: 'center' }}>
                            <a href={LINE_OA_LINK} target="_blank" rel="noopener noreferrer" className="btn btn-success btn-sm">
                                <i className="fa-brands fa-line"></i> LINE OA
                            </a>
                            <span className="text-sm text-muted">
                                <i className="fa-solid fa-calendar-check"></i>{' '}
                                {new Date().toLocaleDateString('th-TH', {
                                    year: 'numeric', month: 'long', day: 'numeric', weekday: 'long',
                                })}
                            </span>
                        </div>
                    </div>

                    <div className="stats-grid">
                        <div className="stat-card glass-card">
                            <div className="stat-icon"><i className="fa-solid fa-users"></i></div>
                            <div className="stat-info">
                                <h3>{stats.total}</h3>
                                <p>ลูกค้าทั้งหมด</p>
                            </div>
                        </div>
                        <div className="stat-card glass-card">
                            <div className="stat-icon"><i className="fa-solid fa-layer-group"></i></div>
                            <div className="stat-info">
                                <h3>{stats.packageTypes}</h3>
                                <p>ประเภทแพ็คเกจ</p>
                            </div>
                        </div>
                        <div className="stat-card glass-card">
                            <div className="stat-icon"><i className="fa-solid fa-house-circle-check"></i></div>
                            <div className="stat-info">
                                <h3>{stats.availableFamilyHeads}</h3>
                                <p>หัวบ้านที่ว่าง</p>
                            </div>
                        </div>
                        <div className="stat-card glass-card">
                            <div className="stat-icon"><i className="fa-solid fa-clock-rotate-left"></i></div>
                            <div className="stat-info">
                                <h3>{stats.expiringSoon}</h3>
                                <p>ใกล้หมดอายุ</p>
                            </div>
                        </div>
                    </div>

                    <div className="charts-row">
                        <div className="glass-card">
                            <div className="chart-title">
                                <i className="fa-solid fa-chart-bar"></i> จำนวนลูกค้าตามแพ็คเกจ
                            </div>
                            <div className="chart-container">
                                <canvas ref={barChartRef}></canvas>
                            </div>
                        </div>
                        <div className="glass-card">
                            <div className="chart-title">
                                <i className="fa-solid fa-chart-pie"></i> สัดส่วนแพ็คเกจ
                            </div>
                            <div className="chart-container">
                                <canvas ref={pieChartRef}></canvas>
                            </div>
                        </div>
                    </div>

                    {/* LINE OA Promotion */}
                    <div className="glass-card" style={{ marginBottom: '1rem', background: 'linear-gradient(135deg, rgba(6,199,85,0.1), rgba(6,199,85,0.05))' }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '1rem', flexWrap: 'wrap' }}>
                            <div style={{
                                width: '3.5rem',
                                height: '3.5rem',
                                borderRadius: '50%',
                                background: '#06C755',
                                display: 'flex',
                                alignItems: 'center',
                                justifyContent: 'center',
                                flexShrink: 0,
                                boxShadow: '0 8px 24px rgba(6,199,85,0.3)'
                            }}>
                                <i className="fa-brands fa-line" style={{ color: 'white', fontSize: '1.5rem' }}></i>
                            </div>
                            <div style={{ flex: 1 }}>
                                <h3 style={{ fontSize: '1rem', fontWeight: 700, marginBottom: '0.25rem' }}>เช็คข้อมูลผ่าน LINE OA</h3>
                                <p className="text-sm text-muted">แอด LINE OA แล้วพิมพ์อีเมลเพื่อเช็คข้อมูลได้ทันที ไม่ต้องเข้าสู่ระบบ!</p>
                            </div>
                            <a href={LINE_OA_LINK} target="_blank" rel="noopener noreferrer" className="btn btn-success">
                                <i className="fa-solid fa-plus"></i> แอด LINE OA
                            </a>
                        </div>
                    </div>

                    {/* แสดงจำนวนลูกค้าแต่ละแพ็คเกจ */}
                    <div className="glass-card" style={{ marginBottom: '1rem' }}>
                        <div className="chart-title" style={{ marginBottom: '1rem' }}>
                            <i className="fa-solid fa-boxes-stacked"></i> จำนวนลูกค้าต่อแพ็คเกจ
                        </div>
                        <div className="package-grid">
                            {Object.entries(stats.packageCounts || {}).map(([pkg, count]) => (
                                <div key={pkg} className="package-item">
                                    <span className="badge badge-info">{pkg}</span>
                                    <span className="count">{count} คน</span>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* แสดงหัวบ้านที่ว่าง */}
                    {stats.availableFamilyHeadsList && stats.availableFamilyHeadsList.length > 0 && (
                        <div className="glass-card" style={{ marginBottom: '1rem' }}>
                            <div className="chart-title" style={{ marginBottom: '1rem' }}>
                                <i className="fa-solid fa-house-circle-exclamation"></i> หัวบ้านที่ว่าง (ไม่เต็ม 5/5)
                            </div>
                            <div className="table-wrapper">
                                <table>
                                    <thead>
                                        <tr>
                                            <th>อีเมล</th>
                                            <th>ชื่อบัญชี</th>
                                            <th>ร้านค้า</th>
                                            <th>สมาชิก</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {stats.availableFamilyHeadsList.map((h, i) => (
                                            <tr key={i}>
                                                <td className="font-semibold">{h.email}</td>
                                                <td>{h.accountName || '-'}</td>
                                                <td><span className="badge badge-neutral">{h.storeName}</span></td>
                                                <td>
                                                    <span className={`badge ${h.memberCount >= 4 ? 'badge-warning' : 'badge-success'}`}>
                                                        <i className="fa-solid fa-user-group"></i> {h.memberCount}/5
                                                    </span>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}

                    {/* ลูกค้าล่าสุด */}
                    <div className="glass-card">
                        <div className="chart-title" style={{ marginBottom: '1.25rem' }}>
                            <i className="fa-solid fa-clock"></i> ลูกค้าล่าสุด
                        </div>
                        <div className="table-wrapper">
                            <table>
                                <thead>
                                    <tr>
                                        <th>อีเมล</th>
                                        <th>ชื่อบัญชี</th>
                                        <th>แพ็คเกจ</th>
                                        <th>ร้านค้า</th>
                                        <th>วันที่ซื้อ</th>
                                        <th>วันหมดอายุ</th>
                                        <th>คงเหลือ</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {(stats.latestCustomers || []).length > 0 ? (
                                        (stats.latestCustomers || []).map((c, i) => {
                                            const remaining = daysRemaining(c.expiryDate);
                                            const statusBadge = getStatusBadge(remaining);
                                            return (
                                                <tr key={i}>
                                                    <td>
                                                        <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                                                            <div style={{
                                                                width: '2rem', height: '2rem', borderRadius: '50%',
                                                                background: 'var(--active-bg)', display: 'flex',
                                                                alignItems: 'center', justifyContent: 'center',
                                                                fontSize: '0.75rem', fontWeight: 600, color: 'var(--accent)',
                                                            }}>
                                                                {c.email?.charAt(0).toUpperCase() || '?'}
                                                            </div>
                                                            <span className="truncate" style={{ maxWidth: '180px' }}>{c.email}</span>
                                                        </div>
                                                    </td>
                                                    <td className="font-semibold">{c.accountName}</td>
                                                    <td><span className="badge badge-info">{c.package}</span></td>
                                                    <td><span className="badge badge-neutral">{c.storeName}</span></td>
                                                    <td className="text-sm">{formatDisplayDate(c.purchaseDate)}</td>
                                                    <td className="text-sm font-semibold">{formatDisplayDate(c.expiryDate)}</td>
                                                    <td><span className={`badge ${statusBadge.className}`}>{statusBadge.text}</span></td>
                                                </tr>
                                            );
                                        })
                                    ) : (
                                        <tr>
                                            <td colSpan="7">
                                                <div className="empty-state" style={{ padding: '2rem 1rem' }}>
                                                    <i className="fa-solid fa-inbox"></i>
                                                    <p>ไม่มีข้อมูลลูกค้า</p>
                                                </div>
                                            </td>
                                        </tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        // ==================== CUSTOMERS PAGE ====================
        const CustomersPage = () => {
            const { user, callAPI, showToast } = useApp();
            const [search, setSearch] = useState('');
            const [showModal, setShowModal] = useState(false);
            const [editingCustomer, setEditingCustomer] = useState(null);
            const [page, setPage] = useState(1);
            const [totalPages, setTotalPages] = useState(1);
            const [total, setTotal] = useState(0);
            const [loading, setLoading] = useState(true);
            const [paginatedCustomers, setPaginatedCustomers] = useState([]);
            const pageSize = 10;

            const [form, setForm] = useState({
                email: '', accountName: '', package: '', storeName: user?.storeName || '',
                houseHead: '', purchaseDate: '', expiryDate: '', notificationEmail: '', status: 'active',
            });

            const getTodayDateString = () => {
                const d = new Date();
                const yyyy = d.getFullYear();
                const mm = String(d.getMonth() + 1).padStart(2, '0');
                const dd = String(d.getDate()).padStart(2, '0');
                return `${yyyy}-${mm}-${dd}`;
            };

            const calculateExpiry = (purchaseDate, packageStr) => {
                if (!purchaseDate || !packageStr) return '';
                const monthsMatch = packageStr.match(/(\d+)\s*เดือน/);
                if (!monthsMatch) return '';
                const months = parseInt(monthsMatch[1]);
                const [year, month, day] = purchaseDate.split('-').map(Number);
                const originalDay = day;
                let targetMonth = month - 1 + months;
                let targetYear = year + Math.floor(targetMonth / 12);
                targetMonth = targetMonth % 12;
                const lastDayOfTargetMonth = new Date(targetYear, targetMonth + 1, 0).getDate();
                const newDay = Math.min(originalDay, lastDayOfTargetMonth);
                const mm = String(targetMonth + 1).padStart(2, '0');
                const dd = String(newDay).padStart(2, '0');
                return `${targetYear}-${mm}-${dd}`;
            };

            const handlePackageChange = (value) => {
                setForm(prev => ({
                    ...prev,
                    package: value,
                    expiryDate: value ? calculateExpiry(prev.purchaseDate, value) : ''
                }));
            };

            const handlePurchaseDateChange = (value) => {
                setForm(prev => ({
                    ...prev,
                    purchaseDate: value,
                    expiryDate: prev.package ? calculateExpiry(value, prev.package) : ''
                }));
            };

            const resetForm = () => {
                setEditingCustomer(null);
                const today = getTodayDateString();
                setForm({
                    email: '',
                    accountName: '',
                    package: '',
                    storeName: user?.storeName || '',
                    houseHead: '',
                    purchaseDate: today,
                    expiryDate: '',
                    notificationEmail: 'sampan082@gmail.com',
                    status: 'active',
                });
            };

            const loadCustomers = useCallback(async (pageNum) => {
                setLoading(true);
                try {
                    const data = await callAPI('getCustomers', { page: pageNum, pageSize });
                    setPaginatedCustomers(data.customers || []);
                    setTotalPages(data.totalPages || 1);
                    setTotal(data.total || 0);
                } catch (e) { }
                setLoading(false);
            }, [callAPI]);

            useEffect(() => {
                loadCustomers(page);
            }, [page, loadCustomers]);

            const openAdd = () => {
                resetForm();
                setShowModal(true);
            };

            const openEdit = (customer) => {
                setEditingCustomer(customer);
                const extractDate = (dateStr) => {
                    if (!dateStr) return '';
                    return dateStr.split(' ')[0] || '';
                };
                setForm({
                    email: customer.email || '',
                    accountName: customer.accountName || '',
                    package: customer.package || '',
                    storeName: customer.storeName || '',
                    houseHead: customer.houseHead || '',
                    purchaseDate: extractDate(customer.purchaseDate),
                    expiryDate: extractDate(customer.expiryDate),
                    notificationEmail: customer.notificationEmail || '',
                    status: customer.status || 'active',
                });
                setShowModal(true);
            };

            const handleSubmit = async () => {
                if (!form.email || !form.accountName || !form.package) {
                    Swal.fire({
                        ...getSwalTheme(),
                        icon: 'warning',
                        title: 'ข้อมูลไม่ครบ',
                        text: 'กรุณากรอกอีเมล ชื่อบัญชี และเลือกแพ็คเกจ',
                    });
                    return;
                }
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(form.email)) {
                    Swal.fire({
                        ...getSwalTheme(),
                        icon: 'warning',
                        title: 'รูปแบบอีเมลไม่ถูกต้อง',
                        text: 'กรุณากรอกอีเมลให้ถูกต้อง',
                    });
                    return;
                }
                try {
                    if (editingCustomer) {
                        await callAPI('updateCustomer', { ...form, id: editingCustomer.id || editingCustomer._id });
                        Swal.fire({
                            ...getSwalTheme(),
                            icon: 'success',
                            title: 'อัปเดตสำเร็จ',
                            text: 'ข้อมูลลูกค้าถูกอัปเดตเรียบร้อยแล้ว',
                            timer: 2000,
                            showConfirmButton: false,
                        });
                    } else {
                        await callAPI('addCustomer', form);
                        Swal.fire({
                            ...getSwalTheme(),
                            icon: 'success',
                            title: 'เพิ่มลูกค้าสำเร็จ',
                            text: 'ลูกค้าใหม่ถูกเพิ่มเรียบร้อยแล้ว',
                            timer: 2000,
                            showConfirmButton: false,
                        });
                    }
                    setShowModal(false);
                    resetForm();
                    loadCustomers(page);
                } catch (e) {
                    Swal.fire({
                        ...getSwalTheme(),
                        icon: 'error',
                        title: 'เกิดข้อผิดพลาด',
                        text: e.message,
                    });
                }
            };

            const handleDelete = async (customer) => {
                const result = await Swal.fire({
                    ...getSwalTheme(),
                    title: '⚠️ ยืนยันการลบ',
                    html: `คุณต้องการลบลูกค้า "<strong>${customer.email}</strong>" ใช่หรือไม่?<br/><small>การกระทำนี้ไม่สามารถเรียกคืนได้</small>`,
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonText: '<i className="fa-solid fa-trash-can"></i> ลบเลย',
                    cancelButtonText: '<i className="fa-solid fa-xmark"></i> ยกเลิก',
                    reverseButtons: true,
                });

                if (!result.isConfirmed) return;

                try {
                    await callAPI('deleteCustomer', { id: customer.id || customer._id });
                    Swal.fire({
                        ...getSwalTheme(),
                        icon: 'success',
                        title: 'ลบสำเร็จ',
                        text: 'ข้อมูลลูกค้าถูกลบเรียบร้อยแล้ว',
                        timer: 2000,
                        showConfirmButton: false,
                    });
                    loadCustomers(page);
                } catch (e) {
                    Swal.fire({
                        ...getSwalTheme(),
                        icon: 'error',
                        title: 'เกิดข้อผิดพลาด',
                        text: e.message,
                    });
                }
            };

            const daysRemaining = (expiryDate) => {
                if (!expiryDate) return null;
                try {
                    return Math.ceil((new Date(expiryDate) - new Date()) / (1000 * 60 * 60 * 24));
                } catch (e) { return null; }
            };

            const getStatusBadge = (remaining) => {
                if (remaining === null) return { className: 'badge-neutral', text: 'ไม่ระบุ' };
                if (remaining < 0) return { className: 'badge-danger', text: `หมดอายุ ${Math.abs(remaining)} วัน` };
                if (remaining <= 2) return { className: 'badge-danger', text: `⚠️ เหลือ ${remaining} วัน` };
                if (remaining <= 7) return { className: 'badge-warning', text: `เหลือ ${remaining} วัน` };
                return { className: 'badge-success', text: `เหลือ ${remaining} วัน` };
            };

            const packageOptions = [
                { label: 'เลือกแพ็คเกจ', value: '' },
                ...Array.from({ length: 12 }, (_, i) => {
                    const month = i + 1;
                    return { label: `${month} เดือน`, value: `${month} เดือน` };
                })
            ];

            const displayedCustomers = search.trim()
                ? paginatedCustomers.filter(c =>
                    (c.email || '').toLowerCase().includes(search.toLowerCase()) ||
                    (c.accountName || '').toLowerCase().includes(search.toLowerCase()) ||
                    (c.storeName || '').toLowerCase().includes(search.toLowerCase()) ||
                    (c.houseHead || '').toLowerCase().includes(search.toLowerCase())
                )
                : paginatedCustomers;

            return (
                <div>
                    <div className="top-bar">
                        <h1 className="page-title">
                            <span className="icon"><i className="fa-solid fa-users"></i></span> จัดการลูกค้า
                        </h1>
                        <div className="quick-actions">
                            <span className="badge badge-info">
                                <i className="fa-solid fa-list-ol"></i> {total} รายการ
                            </span>
                            <button className="btn btn-primary" onClick={openAdd}>
                                <i className="fa-solid fa-plus"></i> เพิ่มลูกค้า
                            </button>
                        </div>
                    </div>

                    <div className="glass-card" style={{ marginBottom: '1rem' }}>
                        <div className="search-box" style={{ marginBottom: 0 }}>
                            <i className="fa-solid fa-magnifying-glass search-icon"></i>
                            <input
                                className="input-field"
                                placeholder="🔍 ค้นหาด้วยอีเมล, ชื่อบัญชี, ร้านค้า, หัวบ้าน..."
                                value={search}
                                onChange={e => setSearch(e.target.value)}
                            />
                        </div>
                    </div>

                    <div className="glass-card">
                        {loading ? (
                            <div className="loading-spinner">
                                <div className="spinner"></div>
                                <p className="text-muted">กำลังโหลดข้อมูล...</p>
                            </div>
                        ) : (
                            <>
                                <div className="table-wrapper">
                                    <table>
                                        <thead>
                                            <tr>
                                                <th>อีเมล</th>
                                                <th>ชื่อบัญชี</th>
                                                <th>แพ็คเกจ</th>
                                                <th>ร้านค้า</th>
                                                <th>หัวบ้าน</th>
                                                <th>วันที่ซื้อ</th>
                                                <th>วันหมดอายุ</th>
                                                <th>คงเหลือ</th>
                                                <th>จัดการ</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {displayedCustomers.length > 0 ? (
                                                displayedCustomers.map((c, i) => {
                                                    const remaining = daysRemaining(c.expiryDate);
                                                    const statusBadge = getStatusBadge(remaining);
                                                    return (
                                                        <tr key={i}>
                                                            <td>
                                                                <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                                                                    <div style={{
                                                                        width: '2rem', height: '2rem', borderRadius: '50%',
                                                                        background: 'var(--active-bg)', display: 'flex',
                                                                        alignItems: 'center', justifyContent: 'center',
                                                                        fontSize: '0.75rem', fontWeight: 600, color: 'var(--accent)', flexShrink: 0,
                                                                    }}>
                                                                        {c.email?.charAt(0).toUpperCase() || '?'}
                                                                    </div>
                                                                    <span className="truncate" style={{ maxWidth: '160px' }}>{c.email}</span>
                                                                </div>
                                                            </td>
                                                            <td className="font-semibold">{c.accountName}</td>
                                                            <td><span className="badge badge-info">{c.package}</span></td>
                                                            <td><span className="badge badge-neutral">{c.storeName}</span></td>
                                                            <td>{c.houseHead || <span className="text-muted">-</span>}</td>
                                                            <td className="text-sm">{formatDisplayDate(c.purchaseDate)}</td>
                                                            <td className="text-sm font-semibold">{formatDisplayDate(c.expiryDate)}</td>
                                                            <td><span className={`badge ${statusBadge.className}`}>{statusBadge.text}</span></td>
                                                            <td>
                                                                <div style={{ display: 'flex', gap: '4px' }}>
                                                                    <button className="btn btn-secondary btn-sm" onClick={() => openEdit(c)} title="แก้ไข">
                                                                        <i className="fa-solid fa-pen-to-square"></i>
                                                                    </button>
                                                                    <button className="btn btn-danger btn-sm" onClick={() => handleDelete(c)} title="ลบ">
                                                                        <i className="fa-solid fa-trash-can"></i>
                                                                    </button>
                                                                </div>
                                                            </td>
                                                        </tr>
                                                    );
                                                })
                                            ) : (
                                                <tr>
                                                    <td colSpan="9">
                                                        <div className="empty-state">
                                                            <i className="fa-solid fa-users-slash"></i>
                                                            <p>{search ? 'ไม่พบข้อมูลที่ค้นหา' : 'ไม่มีข้อมูลลูกค้า'}</p>
                                                        </div>
                                                    </td>
                                                </tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                                <Pagination page={page} totalPages={totalPages} onPageChange={setPage} total={total} />
                            </>
                        )}
                    </div>

                    {showModal && (
                        <div className="modal-overlay" onClick={() => setShowModal(false)}>
                            <div className="modal" onClick={e => e.stopPropagation()}>
                                <h2>
                                    <i className={`fa-solid ${editingCustomer ? 'fa-pen-to-square' : 'fa-plus-circle'}`}></i>
                                    {editingCustomer ? 'แก้ไขข้อมูลลูกค้า' : 'เพิ่มลูกค้าใหม่'}
                                </h2>
                                <div className="grid-2">
                                    <div className="input-group">
                                        <label>อีเมล *</label>
                                        <input className="input-field" type="email" value={form.email}
                                            onChange={e => setForm({ ...form, email: e.target.value })}
                                            placeholder="example@email.com" autoFocus />
                                    </div>
                                    <div className="input-group">
                                        <label>ชื่อบัญชี *</label>
                                        <input className="input-field" value={form.accountName}
                                            onChange={e => setForm({ ...form, accountName: e.target.value })}
                                            placeholder="ชื่อบัญชี YouTube" />
                                    </div>
                                    <div className="input-group">
                                        <label>แพ็คเกจ *</label>
                                        <select className="input-field" value={form.package}
                                            onChange={e => handlePackageChange(e.target.value)}>
                                            {packageOptions.map(opt => (
                                                <option key={opt.value} value={opt.value}>{opt.label}</option>
                                            ))}
                                        </select>
                                    </div>
                                    <div className="input-group">
                                        <label>ร้านค้า</label>
                                        <input className="input-field" value={form.storeName}
                                            onChange={e => setForm({ ...form, storeName: e.target.value })} />
                                    </div>
                                    <div className="input-group">
                                        <label>หัวบ้าน</label>
                                        <input className="input-field" value={form.houseHead}
                                            onChange={e => setForm({ ...form, houseHead: e.target.value })}
                                            placeholder="ชื่อหัวบ้าน (ถ้ามี)" />
                                    </div>
                                    <div className="input-group">
                                        <label>วันที่ซื้อ</label>
                                        <input className="input-field" type="date" value={form.purchaseDate}
                                            onChange={e => handlePurchaseDateChange(e.target.value)} />
                                    </div>
                                    <div className="input-group">
                                        <label>วันที่หมดอายุ</label>
                                        <input className="input-field" type="date" value={form.expiryDate}
                                            onChange={e => setForm({ ...form, expiryDate: e.target.value })} />
                                    </div>
                                    <div className="input-group">
                                        <label>อีเมลแจ้งเตือน</label>
                                        <input className="input-field" type="email" value={form.notificationEmail}
                                            onChange={e => setForm({ ...form, notificationEmail: e.target.value })}
                                            placeholder="email@example.com" />
                                    </div>
                                </div>
                                <div className="modal-actions">
                                    <button className="btn btn-secondary" onClick={() => setShowModal(false)}>
                                        <i className="fa-solid fa-xmark"></i> ยกเลิก
                                    </button>
                                    <button className="btn btn-primary" onClick={handleSubmit}>
                                        <i className={`fa-solid fa-${editingCustomer ? 'check' : 'plus'}`}></i>
                                        {editingCustomer ? 'บันทึกการแก้ไข' : 'เพิ่มลูกค้า'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ==================== CHECK PAGE ====================
        const CheckPage = () => {
            const { user, callAPI, LINE_OA_LINK } = useApp();
            const [searchEmail, setSearchEmail] = useState('');
            const [result, setResult] = useState(null);
            const [searched, setSearched] = useState(false);
            const [searching, setSearching] = useState(false);

            const handleSearch = async () => {
                const trimmedEmail = searchEmail.trim();
                if (!trimmedEmail) return;
                setSearching(true);
                setSearched(false);
                setResult(null);
                try {
                    const data = await callAPI('checkCustomer', { email: trimmedEmail });
                    setResult(data);
                } catch (e) { }
                setSearched(true);
                setSearching(false);
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter') handleSearch();
            };

            const daysRemaining = (expiryDate) => {
                if (!expiryDate) return null;
                try {
                    return Math.ceil((new Date(expiryDate) - new Date()) / (1000 * 60 * 60 * 24));
                } catch (e) { return null; }
            };

            const getStatusInfo = (expiryDate) => {
                const remaining = daysRemaining(expiryDate);
                if (remaining === null) return { icon: 'fa-circle-question', color: 'var(--text-tertiary)', text: 'ไม่ระบุวันหมดอายุ', className: 'badge-neutral' };
                if (remaining < 0) return { icon: 'fa-circle-xmark', color: 'var(--danger)', text: 'หมดอายุแล้ว', className: 'badge-danger' };
                if (remaining <= 2) return { icon: 'fa-circle-exclamation', color: 'var(--danger)', text: `⚠️ ใกล้หมดอายุ (เหลือ ${remaining} วัน)`, className: 'badge-danger' };
                if (remaining <= 7) return { icon: 'fa-circle-exclamation', color: 'var(--warning)', text: `ใกล้หมดอายุ (เหลือ ${remaining} วัน)`, className: 'badge-warning' };
                return { icon: 'fa-circle-check', color: 'var(--success)', text: `✅ ใช้งานได้ (เหลือ ${remaining} วัน)`, className: 'badge-success' };
            };

            return (
                <div>
                    <div className="top-bar">
                        <h1 className="page-title">
                            <span className="icon"><i className="fa-solid fa-magnifying-glass"></i></span> เช็คข้อมูล
                        </h1>
                        <a href={LINE_OA_LINK} target="_blank" rel="noopener noreferrer" className="btn btn-success btn-sm">
                            <i className="fa-brands fa-line"></i> เช็คผ่าน LINE OA
                        </a>
                    </div>

                    {/* LINE OA Info */}
                    <div className="glass-card" style={{ maxWidth: '640px', margin: '0 auto 1rem auto', background: 'linear-gradient(135deg, rgba(6,199,85,0.1), rgba(6,199,85,0.05))' }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem' }}>
                            <i className="fa-brands fa-line" style={{ fontSize: '1.5rem', color: '#06C755' }}></i>
                            <div style={{ flex: 1 }}>
                                <p className="text-sm" style={{ fontWeight: 600 }}>ตรวจสอบข้อมูลผ่าน LINE OA ได้ง่ายๆ</p>
                                <p className="text-xs text-muted">แอด LINE OA แล้วพิมพ์อีเมลเพื่อเช็คข้อมูลทันที</p>
                            </div>
                            <a href={LINE_OA_LINK} target="_blank" rel="noopener noreferrer" className="btn btn-success btn-sm">
                                แอดเลย
                            </a>
                        </div>
                    </div>

                    <div className="glass-card" style={{ maxWidth: '640px', margin: '0 auto' }}>
                        <div style={{ marginBottom: '1.25rem' }}>
                            <div className="input-group" style={{ marginBottom: '0.75rem' }}>
                                <label><i className="fa-solid fa-envelope"></i> ค้นหาด้วยอีเมล</label>
                            </div>
                            <div style={{ display: 'flex', gap: '0.5rem' }}>
                                <input className="input-field" type="email" placeholder="กรอกอีเมลเพื่อค้นหาข้อมูลลูกค้า..."
                                    value={searchEmail} onChange={e => { setSearchEmail(e.target.value); setSearched(false); }}
                                    onKeyDown={handleKeyDown} style={{ flex: 1 }} />
                                <button className="btn btn-primary" onClick={handleSearch}
                                    disabled={searching || !searchEmail.trim()} style={{ whiteSpace: 'nowrap' }}>
                                    {searching ? (
                                        <><div className="spinner" style={{ width: '16px', height: '16px', borderWidth: '2px', borderTopColor: 'white', borderColor: 'rgba(255,255,255,0.3)' }}></div> กำลังค้นหา...</>
                                    ) : (
                                        <><i className="fa-solid fa-magnifying-glass"></i> ค้นหา</>
                                    )}
                                </button>
                            </div>
                        </div>
                        <hr className="divider" />
                        {searched && (
                            <div style={{ animation: 'slideUp 0.3s ease' }}>
                                {result && result.found ? (
                                    <div>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', marginBottom: '1.25rem', color: 'var(--success)', fontWeight: 600, fontSize: '0.9375rem' }}>
                                            <i className="fa-solid fa-circle-check"></i> พบข้อมูลลูกค้า
                                        </div>
                                        <div className="neo-card">
                                            <table style={{ width: '100%' }}>
                                                <tbody>
                                                    <tr><td style={{ fontWeight: 600, color: 'var(--text-secondary)', width: '130px', padding: '0.5rem 0', fontSize: '0.8125rem' }}>อีเมล</td><td className="font-semibold">{result.customer.email}</td></tr>
                                                    <tr><td style={{ fontWeight: 600, color: 'var(--text-secondary)', padding: '0.5rem 0', fontSize: '0.8125rem' }}>ชื่อบัญชี</td><td className="font-semibold">{result.customer.accountName}</td></tr>
                                                    <tr><td style={{ fontWeight: 600, color: 'var(--text-secondary)', padding: '0.5rem 0', fontSize: '0.8125rem' }}>แพ็คเกจ</td><td><span className="badge badge-info">{result.customer.package}</span></td></tr>
                                                    <tr><td style={{ fontWeight: 600, color: 'var(--text-secondary)', padding: '0.5rem 0', fontSize: '0.8125rem' }}>วันที่เริ่มใช้งาน</td><td className="text-sm">{formatDisplayDate(result.customer.purchaseDate)}</td></tr>
                                                    <tr><td style={{ fontWeight: 600, color: 'var(--text-secondary)', padding: '0.5rem 0', fontSize: '0.8125rem' }}>วันที่หมดอายุ</td><td className="font-semibold text-sm">{formatDisplayDate(result.customer.expiryDate)}</td></tr>
                                                    <tr><td style={{ fontWeight: 600, color: 'var(--text-secondary)', padding: '0.5rem 0', fontSize: '0.8125rem' }}>สถานะ</td><td>
                                                        {(() => {
                                                            const s = getStatusInfo(result.customer.expiryDate);
                                                            return (<span style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', color: s.color, fontWeight: 600, fontSize: '0.875rem' }}><i className={`fa-solid ${s.icon}`}></i><span className={`badge ${s.className}`}>{s.text}</span></span>);
                                                        })()}
                                                    </td></tr>
                                                    <tr><td style={{ fontWeight: 600, color: 'var(--text-secondary)', padding: '0.5rem 0', fontSize: '0.8125rem' }}>ร้านค้า</td><td><span className="badge badge-neutral">{result.customer.storeName}</span></td></tr>
                                                    <tr><td style={{ fontWeight: 600, color: 'var(--text-secondary)', padding: '0.5rem 0', fontSize: '0.8125rem' }}>หัวบ้าน</td><td>{result.customer.houseHead || <span className="text-muted">-</span>}</td></tr>
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="empty-state" style={{ padding: '2rem 1rem' }}>
                                        <i className="fa-solid fa-circle-exclamation" style={{ color: 'var(--warning)', opacity: 0.6 }}></i>
                                        <p style={{ fontWeight: 500 }}>ไม่พบข้อมูล</p>
                                        <p className="text-sm text-muted" style={{ marginTop: '0.25rem' }}>ไม่พบลูกค้าที่ใช้อีเมล "{searchEmail}"</p>
                                        <p className="text-xs text-muted" style={{ marginTop: '0.5rem' }}>💡 ลองเช็คผ่าน LINE OA โดยพิมพ์อีเมล</p>
                                    </div>
                                )}
                            </div>
                        )}
                        {!searched && !searching && (
                            <div className="empty-state" style={{ padding: '2rem 1rem' }}>
                                <i className="fa-solid fa-magnifying-glass" style={{ opacity: 0.15, fontSize: '3rem' }}></i>
                                <p className="text-muted">กรอกอีเมลและกดค้นหาเพื่อตรวจสอบข้อมูลลูกค้า</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // ==================== HISTORY PAGE ====================
        const HistoryPage = () => {
            const { callAPI, user } = useApp();
            const [logs, setLogs] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedLog, setSelectedLog] = useState(null);
            const [filter, setFilter] = useState('all');
            const [page, setPage] = useState(1);
            const [totalPages, setTotalPages] = useState(1);
            const [total, setTotal] = useState(0);
            const pageSize = 10;

            const fetchLogs = useCallback(async (pageNum) => {
                setLoading(true);
                try {
                    const data = await callAPI('getLogs', { page: pageNum, pageSize });
                    setLogs(data.logs || []);
                    setTotalPages(data.totalPages || 1);
                    setTotal(data.total || 0);
                } catch (e) { }
                setLoading(false);
            }, [callAPI]);

            useEffect(() => {
                fetchLogs(page);
            }, [page, fetchLogs]);

            const formatAction = (action) => {
                const map = {
                    'loginOrRegister': '🔑 เข้าสู่ระบบ/สมัครสมาชิก',
                    'getCustomers': '📋 ดูรายชื่อลูกค้า',
                    'addCustomer': '➕ เพิ่มลูกค้า',
                    'updateCustomer': '✏️ แก้ไขลูกค้า',
                    'deleteCustomer': '🗑️ ลบลูกค้า',
                    'checkCustomer': '🔍 ตรวจสอบลูกค้า',
                    'getDashboardStats': '📊 ดูแดชบอร์ด',
                    'getUsers': '👥 ดูผู้ใช้',
                    'updateUser': '✏️ แก้ไขผู้ใช้',
                    'deleteUser': '🗑️ ลบผู้ใช้',
                    'getFamilyHeads': '🏠 ดูหัวบ้าน',
                    'addFamilyHead': '➕ เพิ่มหัวบ้าน',
                    'updateFamilyHead': '✏️ แก้ไขหัวบ้าน',
                    'deleteFamilyHead': '🗑️ ลบหัวบ้าน',
                    'addMemberToFamily': '➕ เพิ่มสมาชิกบ้าน',
                    'removeMemberFromFamily': '➖ ลบสมาชิกบ้าน',
                    'getFamilyHeadDetail': '🔍 ดูรายละเอียดหัวบ้าน',
                    'getUserProfile': '👤 ดูโปรไฟล์',
                    'line_check_email': '📱 เช็คอีเมลผ่าน LINE OA',
                };
                return map[action] || `📌 ${action}`;
            };

            const formatDetail = (log) => {
                try {
                    const details = typeof log.details === 'string' ? JSON.parse(log.details) : log.details;
                    if (log.action === 'line_check_email') {
                        return `📱 LINE OA: เช็คอีเมล ${details.email} - ${details.found ? 'พบข้อมูล' : 'ไม่พบข้อมูล'}`;
                    }
                    if (details.action === 'updateCustomer' && details.oldData && details.newData) return `✏️ แก้ไข: ${details.oldData.email || details.oldData.accountName}`;
                    if (details.action === 'deleteCustomer' && details.deletedData) return `🗑️ ลบ: ${details.deletedData.email}`;
                    if (details.action === 'addCustomer' && details.newData) return `➕ เพิ่ม: ${details.newData.email}`;
                    if (details.action === 'register' && details.newUser) return `🆕 สมัครสมาชิก: ${details.newUser.lineName}`;
                    const str = typeof log.details === 'string' ? log.details : JSON.stringify(log.details);
                    return str.length > 100 ? str.substring(0, 100) + '...' : str;
                } catch (e) {
                    const str = log.details || '';
                    return str.length > 100 ? str.substring(0, 100) + '...' : str;
                }
            };

            const getActionIcon = (action) => {
                if (action.includes('add') || action === 'register') return 'fa-plus-circle';
                if (action.includes('update')) return 'fa-pen-to-square';
                if (action.includes('delete') || action.includes('remove')) return 'fa-trash-can';
                if (action.includes('login') || action === 'loginOrRegister') return 'fa-right-to-bracket';
                if (action === 'line_check_email') return 'fa-comment-dots';
                return 'fa-circle-info';
            };

            const getActionColor = (action) => {
                if (action.includes('add') || action === 'register') return 'var(--success)';
                if (action.includes('update')) return 'var(--info)';
                if (action.includes('delete') || action.includes('remove')) return 'var(--danger)';
                if (action.includes('login') || action === 'loginOrRegister') return 'var(--warning)';
                if (action === 'line_check_email') return '#06C755';
                return 'var(--text-secondary)';
            };

            const filteredLogs = logs.filter(log => {
                if (filter === 'all') return true;
                if (filter === 'add') return log.action.includes('add') || log.action === 'register';
                if (filter === 'edit') return log.action.includes('update');
                if (filter === 'delete') return log.action.includes('delete') || log.action.includes('remove');
                if (filter === 'login') return log.action === 'loginOrRegister' || log.action === 'login';
                if (filter === 'line') return log.action === 'line_check_email';
                return true;
            });

            return (
                <div>
                    <div className="top-bar">
                        <h1 className="page-title">
                            <span className="icon"><i className="fa-solid fa-clock-rotate-left"></i></span> ประวัติการใช้งาน
                            {user?.rank === 1 && <span className="badge badge-danger" style={{ fontSize: '0.625rem' }}>เห็นทั้งหมด</span>}
                        </h1>
                        <div className="quick-actions">
                            <span className="badge badge-info"><i className="fa-solid fa-list-ol"></i> {total} รายการ</span>
                            <button className="btn btn-secondary btn-sm" onClick={() => fetchLogs(page)}>
                                <i className="fa-solid fa-rotate"></i> รีเฟรช
                            </button>
                        </div>
                    </div>

                    <div className="glass-card" style={{ marginBottom: '1rem', padding: '0.75rem 1rem' }}>
                        <div style={{ display: 'flex', gap: '0.5rem', flexWrap: 'wrap' }}>
                            {['all', 'add', 'edit', 'delete', 'login', 'line'].map(f => (
                                <button key={f} className={`btn btn-sm ${filter === f ? 'btn-primary' : 'btn-secondary'}`}
                                    onClick={() => { setFilter(f); setPage(1); }}>
                                    {f === 'all' ? '📋 ทั้งหมด' :
                                        f === 'add' ? '➕ เพิ่ม' :
                                            f === 'edit' ? '✏️ แก้ไข' :
                                                f === 'delete' ? '🗑️ ลบ' :
                                                    f === 'login' ? '🔑 เข้าสู่ระบบ' :
                                                        '📱 LINE OA'}
                                </button>
                            ))}
                        </div>
                    </div>

                    <div className="glass-card">
                        {loading ? (
                            <div className="loading-spinner"><div className="spinner"></div><p className="text-muted">กำลังโหลดประวัติ...</p></div>
                        ) : filteredLogs.length === 0 ? (
                            <div className="empty-state"><i className="fa-solid fa-clock"></i><p>ไม่มีประวัติการใช้งาน</p></div>
                        ) : (
                            <>
                                <div className="table-wrapper">
                                    <table>
                                        <thead><tr><th>เวลา</th><th>ประเภท</th><th>สรุป</th><th>ดู</th></tr></thead>
                                        <tbody>
                                            {filteredLogs.map((log, i) => (
                                                <tr key={i}>
                                                    <td className="text-sm font-mono" style={{ fontSize: '0.75rem' }}>
                                                        {new Date(log.timestamp).toLocaleString('th-TH', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' })}
                                                    </td>
                                                    <td><span style={{ display: 'inline-flex', alignItems: 'center', gap: '0.375rem', color: getActionColor(log.action), fontWeight: 600, fontSize: '0.8125rem' }}><i className={`fa-solid ${getActionIcon(log.action)}`}></i>{formatAction(log.action)}</span></td>
                                                    <td className="text-sm">{formatDetail(log)}</td>
                                                    <td><button className="btn btn-info btn-xs" onClick={() => setSelectedLog(log)}><i className="fa-solid fa-eye"></i></button></td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                                <Pagination page={page} totalPages={totalPages} onPageChange={setPage} total={total} />
                            </>
                        )}
                    </div>

                    {selectedLog && (
                        <div className="modal-overlay" onClick={() => setSelectedLog(null)}>
                            <div className="modal" onClick={e => e.stopPropagation()}>
                                <h2><i className="fa-solid fa-magnifying-glass"></i> รายละเอียดการทำรายการ</h2>
                                <div className="neo-card" style={{ marginBottom: '1rem' }}>
                                    <table style={{ width: '100%' }}>
                                        <tbody>
                                            <tr><td style={{ fontWeight: 600, width: '100px', padding: '0.5rem 0', fontSize: '0.8125rem' }}>เวลา</td><td className="font-mono text-sm">{new Date(selectedLog.timestamp).toLocaleString('th-TH', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' })}</td></tr>
                                            <tr><td style={{ fontWeight: 600, padding: '0.5rem 0', fontSize: '0.8125rem' }}>ประเภท</td><td><span style={{ color: getActionColor(selectedLog.action), fontWeight: 600 }}><i className={`fa-solid ${getActionIcon(selectedLog.action)}`}></i> {formatAction(selectedLog.action)}</span></td></tr>
                                            {selectedLog.storeName && <tr><td style={{ fontWeight: 600, padding: '0.5rem 0', fontSize: '0.8125rem' }}>ร้านค้า</td><td><span className="badge badge-neutral">{selectedLog.storeName}</span></td></tr>}
                                        </tbody>
                                    </table>
                                </div>
                                <div className="neo-card">
                                    <h3 style={{ marginBottom: '0.75rem', fontSize: '0.9375rem', fontWeight: 600 }}><i className="fa-solid fa-file-lines" style={{ color: 'var(--info)', marginRight: '0.5rem' }}></i>ข้อมูลโดยละเอียด</h3>
                                    <pre style={{ background: 'var(--bg-tertiary)', padding: '1rem', borderRadius: 'var(--radius-md)', overflowX: 'auto', fontSize: '0.75rem', maxHeight: '400px', overflowY: 'auto', whiteSpace: 'pre-wrap', wordBreak: 'break-word', fontFamily: 'var(--font-mono)', lineHeight: 1.6, border: '1px solid var(--border-color)' }}>
                                        {(() => { try { return JSON.stringify(typeof selectedLog.details === 'string' ? JSON.parse(selectedLog.details) : selectedLog.details, null, 2); } catch (e) { return selectedLog.details || '-'; } })()}
                                    </pre>
                                </div>
                                <div className="modal-actions">
                                    <button className="btn btn-secondary" onClick={() => setSelectedLog(null)}><i className="fa-solid fa-xmark"></i> ปิด</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ==================== PROFILE PAGE ====================
        const ProfilePage = () => {
            const { user, logout, LINE_OA_LINK } = useApp();

            const handleLogout = () => {
                Swal.fire({
                    ...getSwalTheme(),
                    title: 'ยืนยันการออกจากระบบ',
                    text: 'คุณต้องการออกจากระบบใช่หรือไม่?',
                    icon: 'question',
                    showCancelButton: true,
                    confirmButtonText: '<i className="fa-solid fa-right-from-bracket"></i> ออกจากระบบ',
                    cancelButtonText: '<i className="fa-solid fa-xmark"></i> ยกเลิก',
                }).then((result) => {
                    if (result.isConfirmed) {
                        logout();
                    }
                });
            };

            return (
                <div>
                    <div className="top-bar"><h1 className="page-title"><span className="icon"><i className="fa-solid fa-user-circle"></i></span> โปรไฟล์</h1></div>
                    <div className="glass-card" style={{ maxWidth: '540px' }}>
                        <div style={{ textAlign: 'center', marginBottom: '2rem' }}>
                            <div className="user-avatar" style={{ width: '5.5rem', height: '5.5rem', margin: '0 auto 1.25rem', fontSize: '2rem', borderWidth: '3px', borderColor: 'var(--accent)', boxShadow: '0 0 30px var(--accent-glow)' }}>
                                {user?.pictureUrl ? <img src={user.pictureUrl} alt={user?.lineName || 'User'} onError={(e) => { e.target.style.display = 'none'; e.target.parentElement.querySelector('i').style.display = 'flex'; }} /> : null}
                                <i className="fa-solid fa-user" style={{ display: user?.pictureUrl ? 'none' : 'flex', alignItems: 'center', justifyContent: 'center', width: '100%', height: '100%' }}></i>
                            </div>
                            <h2 style={{ fontSize: '1.25rem', fontWeight: 700 }}>{user?.lineName || 'ผู้ใช้งาน'}</h2>
                            <div style={{ marginTop: '0.5rem' }}>{user?.rank === 1 ? <span className="badge badge-danger"><i className="fa-solid fa-crown"></i> แอดมิน</span> : <span className="badge badge-info"><i className="fa-solid fa-user"></i> สมาชิก</span>}</div>
                        </div>
                        <div className="neo-card" style={{ marginBottom: '1rem' }}>
                            <table style={{ width: '100%' }}>
                                <tbody>
                                    <tr><td style={{ fontWeight: 600, color: 'var(--text-secondary)', padding: '0.625rem 0', width: '130px', fontSize: '0.8125rem' }}>ชื่อไลน์</td><td className="font-semibold">{user?.lineName || '-'}</td></tr>
                                    <tr><td style={{ fontWeight: 600, color: 'var(--text-secondary)', padding: '0.625rem 0', fontSize: '0.8125rem' }}>ร้านค้า</td><td><span className="badge badge-neutral">{user?.storeName || '-'}</span></td></tr>
                                    <tr><td style={{ fontWeight: 600, color: 'var(--text-secondary)', padding: '0.625rem 0', fontSize: '0.8125rem' }}>LINE User ID</td><td className="font-mono text-sm text-muted">{user?.userId || user?.id || '-'}</td></tr>
                                    <tr><td style={{ fontWeight: 600, color: 'var(--text-secondary)', padding: '0.625rem 0', fontSize: '0.8125rem' }}>วันที่สมัคร</td><td className="text-sm">{user?.createdAt ? new Date(user.createdAt).toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' }) : '-'}</td></tr>
                                </tbody>
                            </table>
                        </div>

                        {/* LINE OA Link */}
                        <div style={{ marginBottom: '1rem', padding: '1rem', background: 'rgba(6,199,85,0.05)', borderRadius: 'var(--radius-md)', border: '1px solid rgba(6,199,85,0.2)' }}>
                            <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem' }}>
                                <i className="fa-brands fa-line" style={{ fontSize: '1.5rem', color: '#06C755' }}></i>
                                <div style={{ flex: 1 }}>
                                    <p className="text-sm" style={{ fontWeight: 600 }}>LINE OA สำหรับเช็คข้อมูล</p>
                                    <p className="text-xs text-muted">แอด LINE OA แล้วพิมพ์อีเมลเพื่อเช็คข้อมูลได้ทันที</p>
                                </div>
                                <a href={LINE_OA_LINK} target="_blank" rel="noopener noreferrer" className="btn btn-success btn-sm">
                                    <i className="fa-solid fa-plus"></i> แอด
                                </a>
                            </div>
                        </div>

                        <div style={{ textAlign: 'center', paddingTop: '1.25rem', borderTop: '1px solid var(--border-color)' }}>
                            <button className="btn btn-danger" onClick={handleLogout} style={{ borderRadius: 'var(--radius-full)', padding: '0.75rem 2rem' }}><i className="fa-solid fa-right-from-bracket"></i> ออกจากระบบ</button>
                        </div>
                    </div>
                </div>
            );
        };

        // ==================== USERS PAGE ====================
        const UsersPage = () => {
            const { callAPI, showToast, user: currentUser } = useApp();
            const [users, setUsers] = useState([]);
            const [loading, setLoading] = useState(true);
            const [page, setPage] = useState(1);
            const [totalPages, setTotalPages] = useState(1);
            const [total, setTotal] = useState(0);
            const [showModal, setShowModal] = useState(false);
            const [editingUser, setEditingUser] = useState(null);
            const [form, setForm] = useState({ lineName: '', storeName: '', rank: 0 });
            const pageSize = 10;

            const fetchUsers = useCallback(async (pageNum) => {
                setLoading(true);
                try {
                    const data = await callAPI('getUsers', { page: pageNum, pageSize });
                    setUsers(data.users || []);
                    setTotalPages(data.totalPages || 1);
                    setTotal(data.total || 0);
                } catch (e) { }
                setLoading(false);
            }, [callAPI]);

            useEffect(() => { fetchUsers(page); }, [page, fetchUsers]);

            const openEdit = (u) => {
                setEditingUser(u);
                setForm({ lineName: u.lineName || '', storeName: u.storeName || '', rank: parseInt(u.rank) || 0 });
                setShowModal(true);
            };

            const handleSave = async () => {
                if (!form.lineName.trim()) {
                    Swal.fire({ ...getSwalTheme(), icon: 'warning', title: 'ข้อมูลไม่ครบ', text: 'กรุณากรอกชื่อไลน์' });
                    return;
                }
                try {
                    await callAPI('updateUser', { ...form, id: editingUser.id || editingUser._id });
                    Swal.fire({ ...getSwalTheme(), icon: 'success', title: 'อัปเดตผู้ใช้สำเร็จ', timer: 2000, showConfirmButton: false });
                    setShowModal(false);
                    fetchUsers(page);
                } catch (e) {
                    Swal.fire({ ...getSwalTheme(), icon: 'error', title: 'ผิดพลาด', text: e.message });
                }
            };

            const handleDelete = async (u) => {
                if (u.id === currentUser?.id) {
                    Swal.fire({ ...getSwalTheme(), icon: 'error', title: 'ไม่สามารถลบบัญชีตัวเองได้' });
                    return;
                }
                const result = await Swal.fire({
                    ...getSwalTheme(),
                    title: '⚠️ ยืนยันการลบผู้ใช้',
                    html: `คุณต้องการลบผู้ใช้ "<strong>${u.lineName}</strong>" ใช่หรือไม่?<br/><small>การกระทำนี้ไม่สามารถเรียกคืนได้</small>`,
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonText: '<i className="fa-solid fa-trash-can"></i> ลบเลย',
                    cancelButtonText: '<i className="fa-solid fa-xmark"></i> ยกเลิก',
                });
                if (!result.isConfirmed) return;
                try {
                    await callAPI('deleteUser', { id: u.id || u._id });
                    Swal.fire({ ...getSwalTheme(), icon: 'success', title: 'ลบผู้ใช้สำเร็จ', timer: 2000, showConfirmButton: false });
                    fetchUsers(page);
                } catch (e) {
                    Swal.fire({ ...getSwalTheme(), icon: 'error', title: 'ผิดพลาด', text: e.message });
                }
            };

            const formatDate = (dateStr) => {
                if (!dateStr) return '-';
                try { return new Date(dateStr).toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' }); } catch (e) { return '-'; }
            };

            const formatDateTime = (dateStr) => {
                if (!dateStr) return '-';
                try { return new Date(dateStr).toLocaleString('th-TH', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }); } catch (e) { return '-'; }
            };

            return (
                <div>
                    <div className="top-bar">
                        <h1 className="page-title"><span className="icon"><i className="fa-solid fa-user-shield"></i></span> จัดการผู้ใช้</h1>
                        <div className="quick-actions"><span className="badge badge-info"><i className="fa-solid fa-users"></i> {total} ผู้ใช้</span></div>
                    </div>
                    <div className="glass-card">
                        {loading ? (
                            <div className="loading-spinner"><div className="spinner"></div><p>กำลังโหลด...</p></div>
                        ) : (
                            <>
                                <div className="table-wrapper">
                                    <table>
                                        <thead><tr><th>ชื่อไลน์</th><th>ร้านค้า</th><th>ระดับ</th><th>วันที่สร้าง</th><th>เข้าสู่ระบบล่าสุด</th><th>จัดการ</th></tr></thead>
                                        <tbody>
                                            {users.map((u, i) => (
                                                <tr key={i} style={u.id === currentUser?.id ? { background: 'var(--active-bg)' } : {}}>
                                                    <td>
                                                        <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                                                            <div className="user-avatar" style={{ width: '2rem', height: '2rem', fontSize: '0.75rem' }}>
                                                                {u.pictureUrl ? <img src={u.pictureUrl} alt="" onError={(e) => { e.target.style.display = 'none'; }} /> : <i className="fa-solid fa-user"></i>}
                                                            </div>
                                                            <div><div className="font-semibold text-sm">{u.lineName}</div>{u.id === currentUser?.id && <span className="text-xs" style={{ color: 'var(--accent)' }}>คุณ</span>}</div>
                                                        </div>
                                                    </td>
                                                    <td><span className="badge badge-neutral">{u.storeName}</span></td>
                                                    <td>{u.rank === 1 ? <span className="badge badge-danger"><i className="fa-solid fa-crown"></i> แอดมิน</span> : <span className="badge badge-info"><i className="fa-solid fa-user"></i> สมาชิก</span>}</td>
                                                    <td className="text-sm">{formatDate(u.createdAt)}</td>
                                                    <td className="text-sm">{formatDateTime(u.lastLogin)}</td>
                                                    <td>
                                                        <div style={{ display: 'flex', gap: '4px' }}>
                                                            <button className="btn btn-secondary btn-sm" onClick={() => openEdit(u)} title="แก้ไข"><i className="fa-solid fa-pen-to-square"></i></button>
                                                            <button className="btn btn-danger btn-sm" onClick={() => handleDelete(u)} disabled={u.id === currentUser?.id} title={u.id === currentUser?.id ? 'ไม่สามารถลบตัวเองได้' : 'ลบ'}><i className="fa-solid fa-trash-can"></i></button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                                <Pagination page={page} totalPages={totalPages} onPageChange={setPage} total={total} />
                            </>
                        )}
                    </div>
                    {showModal && (
                        <div className="modal-overlay" onClick={() => setShowModal(false)}>
                            <div className="modal" onClick={e => e.stopPropagation()}>
                                <h2><i className="fa-solid fa-pen-to-square"></i> แก้ไขผู้ใช้</h2>
                                <div className="input-group"><label>ชื่อไลน์</label><input className="input-field" value={form.lineName} onChange={e => setForm({ ...form, lineName: e.target.value })} placeholder="ชื่อไลน์" /></div>
                                <div className="input-group"><label>ชื่อร้านค้า</label><input className="input-field" value={form.storeName} onChange={e => setForm({ ...form, storeName: e.target.value })} placeholder="ชื่อร้านค้า" /></div>
                                <div className="input-group"><label>ระดับ</label><select className="input-field" value={form.rank} onChange={e => setForm({ ...form, rank: parseInt(e.target.value) })}><option value={0}>👤 สมาชิก</option><option value={1}>👑 แอดมิน</option></select></div>
                                <div className="modal-actions">
                                    <button className="btn btn-secondary" onClick={() => setShowModal(false)}><i className="fa-solid fa-xmark"></i> ยกเลิก</button>
                                    <button className="btn btn-primary" onClick={handleSave}><i className="fa-solid fa-check"></i> บันทึก</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ==================== FAMILY HEADS PAGE ====================
        const FamilyHeadsPage = () => {
            const { user, callAPI, showToast, setCurrentPage } = useApp();
            const isAdmin = user?.rank === 1;
            const [familyHeads, setFamilyHeads] = useState([]);
            const [loading, setLoading] = useState(true);
            const [page, setPage] = useState(1);
            const [totalPages, setTotalPages] = useState(1);
            const [total, setTotal] = useState(0);
            const pageSize = 10;
            const [showAddHeadModal, setShowAddHeadModal] = useState(false);
            const [showAddMemberModal, setShowAddMemberModal] = useState(false);
            const [showEditHeadModal, setShowEditHeadModal] = useState(false);
            const [showDetailModal, setShowDetailModal] = useState(false);
            const [selectedHead, setSelectedHead] = useState(null);
            const [memberEmail, setMemberEmail] = useState('');
            const [headForm, setHeadForm] = useState({ email: '', accountName: '', storeName: user?.storeName || '' });
            const [editHeadForm, setEditHeadForm] = useState({ email: '', accountName: '', storeName: '' });
