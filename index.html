            const [familyHeadDetail, setFamilyHeadDetail] = useState(null);

            useEffect(() => {
                if (!isAdmin) { showToast('คุณไม่มีสิทธิ์เข้าถึงหน้านี้', 'warning'); setCurrentPage('dashboard'); }
            }, [isAdmin, showToast, setCurrentPage]);

            const fetchFamilyHeads = useCallback(async (pageNum) => {
                if (!isAdmin) return;
                setLoading(true);
                try {
                    const data = await callAPI('getFamilyHeads', { page: pageNum, pageSize });
                    setFamilyHeads(data.familyHeads || []);
                    setTotalPages(data.totalPages || 1);
                    setTotal(data.total || 0);
                } catch (e) { }
                setLoading(false);
            }, [callAPI, isAdmin]);

            useEffect(() => { if (isAdmin) fetchFamilyHeads(page); }, [page, fetchFamilyHeads, isAdmin]);

            const handleAddHead = async () => {
                if (!headForm.email.trim()) {
                    Swal.fire({ ...getSwalTheme(), icon: 'warning', title: 'กรุณากรอกอีเมล' });
                    return;
                }
                try {
                    await callAPI('addFamilyHead', headForm);
                    Swal.fire({ ...getSwalTheme(), icon: 'success', title: 'เพิ่มหัวบ้านสำเร็จ', timer: 2000, showConfirmButton: false });
                    setShowAddHeadModal(false);
                    setHeadForm({ email: '', accountName: '', storeName: user?.storeName || '' });
                    fetchFamilyHeads(page);
                } catch (e) {
                    Swal.fire({ ...getSwalTheme(), icon: 'error', title: 'ผิดพลาด', text: e.message });
                }
            };

            const handleEditHead = async () => {
                if (!editHeadForm.email.trim()) {
                    Swal.fire({ ...getSwalTheme(), icon: 'warning', title: 'กรุณากรอกอีเมล' });
                    return;
                }
                try {
                    await callAPI('updateFamilyHead', { ...editHeadForm, id: selectedHead.id });
                    Swal.fire({ ...getSwalTheme(), icon: 'success', title: 'อัปเดตหัวบ้านสำเร็จ', timer: 2000, showConfirmButton: false });
                    setShowEditHeadModal(false);
                    setSelectedHead(null);
                    fetchFamilyHeads(page);
                } catch (e) {
                    Swal.fire({ ...getSwalTheme(), icon: 'error', title: 'ผิดพลาด', text: e.message });
                }
            };

            const handleDeleteHead = async (head) => {
                const result = await Swal.fire({
                    ...getSwalTheme(),
                    title: '⚠️ ยืนยันการลบหัวบ้าน',
                    html: `ลบ "<strong>${head.email}</strong>" และสมาชิกทั้งหมด?<br/><small>ไม่สามารถกู้คืนได้</small>`,
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonText: '<i className="fa-solid fa-trash-can"></i> ลบ',
                    cancelButtonText: 'ยกเลิก',
                });
                if (!result.isConfirmed) return;
                try {
                    await callAPI('deleteFamilyHead', { id: head.id });
                    Swal.fire({ ...getSwalTheme(), icon: 'success', title: 'ลบหัวบ้านแล้ว', timer: 2000, showConfirmButton: false });
                    fetchFamilyHeads(page);
                } catch (e) {
                    Swal.fire({ ...getSwalTheme(), icon: 'error', title: 'ผิดพลาด', text: e.message });
                }
            };

            const handleAddMember = async () => {
                if (!memberEmail.trim()) {
                    Swal.fire({ ...getSwalTheme(), icon: 'warning', title: 'กรุณากรอกอีเมลสมาชิก' });
                    return;
                }
                try {
                    await callAPI('addMemberToFamily', { familyHeadId: selectedHead.id, memberEmail: memberEmail.trim() });
                    Swal.fire({ ...getSwalTheme(), icon: 'success', title: 'เพิ่มสมาชิกสำเร็จ', timer: 2000, showConfirmButton: false });
                    setMemberEmail('');
                    setShowAddMemberModal(false);
                    fetchFamilyHeads(page);
                } catch (e) {
                    Swal.fire({ ...getSwalTheme(), icon: 'error', title: 'ผิดพลาด', text: e.message });
                }
            };

            const handleRemoveMember = async (memberEmailToRemove) => {
                const result = await Swal.fire({
                    ...getSwalTheme(),
                    title: 'ลบสมาชิก',
                    html: `ลบ "<strong>${memberEmailToRemove}</strong>" ออกจากบ้านนี้?`,
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonText: 'ลบ',
                    cancelButtonText: 'ยกเลิก',
                });
                if (!result.isConfirmed) return;
                try {
                    await callAPI('removeMemberFromFamily', { familyHeadId: selectedHead.id, memberEmail: memberEmailToRemove });
                    Swal.fire({ ...getSwalTheme(), icon: 'success', title: 'ลบสมาชิกแล้ว', timer: 2000, showConfirmButton: false });
                    fetchFamilyHeads(page);
                    if (showDetailModal && selectedHead) openDetail(selectedHead);
                } catch (e) {
                    Swal.fire({ ...getSwalTheme(), icon: 'error', title: 'ผิดพลาด', text: e.message });
                }
            };

            const openDetail = async (head) => {
                setSelectedHead(head);
                try {
                    const data = await callAPI('getFamilyHeadDetail', { id: head.id });
                    setFamilyHeadDetail(data.familyHead);
                    setShowDetailModal(true);
                } catch (e) {
                    Swal.fire({ ...getSwalTheme(), icon: 'error', title: 'เกิดข้อผิดพลาดในการโหลดรายละเอียด' });
                }
            };

            const openEdit = (head) => {
                setSelectedHead(head);
                setEditHeadForm({ email: head.email || '', accountName: head.accountName || '', storeName: head.storeName || '' });
                setShowEditHeadModal(true);
            };

            const openAddMember = (head) => {
                setSelectedHead(head);
                setMemberEmail('');
                setShowAddMemberModal(true);
            };

            if (!isAdmin) return (
                <div>
                    <div className="top-bar"><h1 className="page-title"><span className="icon">🏠</span> จัดการหัวบ้าน</h1></div>
                    <div className="glass-card"><div className="loading-spinner"><div className="spinner"></div><p className="text-muted">กำลังตรวจสอบสิทธิ์...</p></div></div>
                </div>
            );

            if (loading && familyHeads.length === 0) return (
                <div>
                    <div className="top-bar"><h1 className="page-title"><span className="icon">🏠</span> จัดการหัวบ้าน</h1></div>
                    <div className="glass-card"><div className="loading-spinner"><div className="spinner"></div><p className="text-muted">กำลังโหลดข้อมูลหัวบ้าน...</p></div></div>
                </div>
            );

            return (
                <div>
                    <div className="top-bar">
                        <h1 className="page-title"><span className="icon"><i className="fa-solid fa-house-chimney"></i></span> จัดการหัวบ้าน</h1>
                        <div className="quick-actions">
                            <span className="badge badge-info"><i className="fa-solid fa-house-chimney"></i> {total} หัวบ้าน</span>
                            <button className="btn btn-primary" onClick={() => setShowAddHeadModal(true)}><i className="fa-solid fa-plus"></i> เพิ่มหัวบ้าน</button>
                        </div>
                    </div>

                    <div className="glass-card">
                        {familyHeads.length === 0 ? (
                            <div className="empty-state"><i className="fa-solid fa-house-circle-exclamation"></i><p>ไม่มีข้อมูลหัวบ้าน</p></div>
                        ) : (
                            <>
                                <div className="table-wrapper">
                                    <table>
                                        <thead><tr><th>อีเมล</th><th>ชื่อบัญชี</th><th>ร้านค้า</th><th>จำนวนสมาชิก</th><th>สถานะ</th><th>จัดการ</th></tr></thead>
                                        <tbody>
                                            {familyHeads.map((head, i) => {
                                                const memberCount = parseInt(head.memberCount) || 0;
                                                const isFull = memberCount >= 5;
                                                return (
                                                    <tr key={i}>
                                                        <td>
                                                            <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                                                                <div style={{ width: '2rem', height: '2rem', borderRadius: '50%', background: 'var(--active-bg)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '0.75rem', fontWeight: 600, color: 'var(--accent)', flexShrink: 0 }}>{head.email?.charAt(0).toUpperCase()}</div>
                                                                <span className="font-semibold">{head.email}</span>
                                                            </div>
                                                        </td>
                                                        <td>{head.accountName || '-'}</td>
                                                        <td><span className="badge badge-neutral">{head.storeName}</span></td>
                                                        <td><span className={`badge ${isFull ? 'badge-danger' : 'badge-success'}`}><i className="fa-solid fa-user-group"></i> {memberCount}/5</span></td>
                                                        <td><span className="badge badge-success"><span className="status-dot active"></span>{head.status || 'active'}</span></td>
                                                        <td>
                                                            <div style={{ display: 'flex', gap: '3px', flexWrap: 'wrap' }}>
                                                                <button className="btn btn-info btn-xs" onClick={() => openAddMember(head)} title="เพิ่มสมาชิก" disabled={isFull}><i className="fa-solid fa-user-plus"></i></button>
                                                                <button className="btn btn-secondary btn-xs" onClick={() => openDetail(head)} title="ดูรายละเอียด"><i className="fa-solid fa-eye"></i></button>
                                                                <button className="btn btn-secondary btn-xs" onClick={() => openEdit(head)} title="แก้ไข"><i className="fa-solid fa-pen-to-square"></i></button>
                                                                <button className="btn btn-danger btn-xs" onClick={() => handleDeleteHead(head)} title="ลบ"><i className="fa-solid fa-trash-can"></i></button>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                                <Pagination page={page} totalPages={totalPages} onPageChange={setPage} total={total} />
                            </>
                        )}
                    </div>

                    {/* Add Head Modal */}
                    {showAddHeadModal && (
                        <div className="modal-overlay" onClick={() => setShowAddHeadModal(false)}>
                            <div className="modal" onClick={e => e.stopPropagation()}>
                                <h2><i className="fa-solid fa-house-chimney-medical"></i> เพิ่มหัวบ้านใหม่</h2>
                                <div className="grid-2">
                                    <div className="input-group"><label>อีเมลหัวบ้าน *</label><input className="input-field" type="email" value={headForm.email} onChange={e => setHeadForm({ ...headForm, email: e.target.value })} placeholder="head@example.com" autoFocus /></div>
                                    <div className="input-group"><label>ชื่อบัญชี</label><input className="input-field" value={headForm.accountName} onChange={e => setHeadForm({ ...headForm, accountName: e.target.value })} placeholder="ชื่อบัญชี YouTube" /></div>
                                    <div className="input-group"><label>ร้านค้า</label><input className="input-field" value={headForm.storeName} onChange={e => setHeadForm({ ...headForm, storeName: e.target.value })} /></div>
                                </div>
                                <div style={{ marginTop: '1rem', padding: '0.75rem 1rem', background: 'var(--info-light)', borderRadius: 'var(--radius-md)', fontSize: '0.8125rem', color: 'var(--text-secondary)' }}>
                                    <i className="fa-solid fa-info-circle" style={{ color: 'var(--info)', marginRight: '0.5rem' }}></i>คุณสามารถเพิ่มสมาชิกในบ้านนี้ได้สูงสุด 5 คน
                                </div>
                                <div className="modal-actions">
                                    <button className="btn btn-secondary" onClick={() => setShowAddHeadModal(false)}><i className="fa-solid fa-xmark"></i> ยกเลิก</button>
                                    <button className="btn btn-primary" onClick={handleAddHead}><i className="fa-solid fa-plus"></i> เพิ่มหัวบ้าน</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Edit Head Modal */}
                    {showEditHeadModal && selectedHead && (
                        <div className="modal-overlay" onClick={() => setShowEditHeadModal(false)}>
                            <div className="modal" onClick={e => e.stopPropagation()}>
                                <h2><i className="fa-solid fa-pen-to-square"></i> แก้ไขหัวบ้าน</h2>
                                <div className="grid-2">
                                    <div className="input-group"><label>อีเมล *</label><input className="input-field" type="email" value={editHeadForm.email} onChange={e => setEditHeadForm({ ...editHeadForm, email: e.target.value })} /></div>
                                    <div className="input-group"><label>ชื่อบัญชี</label><input className="input-field" value={editHeadForm.accountName} onChange={e => setEditHeadForm({ ...editHeadForm, accountName: e.target.value })} /></div>
                                    <div className="input-group"><label>ร้านค้า</label><input className="input-field" value={editHeadForm.storeName} onChange={e => setEditHeadForm({ ...editHeadForm, storeName: e.target.value })} /></div>
                                </div>
                                <div className="modal-actions">
                                    <button className="btn btn-secondary" onClick={() => setShowEditHeadModal(false)}><i className="fa-solid fa-xmark"></i> ยกเลิก</button>
                                    <button className="btn btn-primary" onClick={handleEditHead}><i className="fa-solid fa-check"></i> บันทึก</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Add Member Modal */}
                    {showAddMemberModal && selectedHead && (
                        <div className="modal-overlay" onClick={() => setShowAddMemberModal(false)}>
                            <div className="modal" onClick={e => e.stopPropagation()}>
                                <h2><i className="fa-solid fa-user-plus"></i> เพิ่มสมาชิกในบ้าน</h2>
                                <p style={{ marginBottom: '1rem', color: 'var(--text-secondary)', fontSize: '0.875rem' }}>หัวบ้าน: <strong>{selectedHead.email}</strong> (สมาชิก: {selectedHead.memberCount || 0}/5)</p>
                                <div className="input-group"><label>อีเมลสมาชิก *</label><input className="input-field" type="email" value={memberEmail} onChange={e => setMemberEmail(e.target.value)} placeholder="member@example.com" onKeyDown={e => e.key === 'Enter' && handleAddMember()} autoFocus /></div>
                                <div style={{ marginTop: '0.75rem', padding: '0.75rem 1rem', background: 'var(--info-light)', borderRadius: 'var(--radius-md)', fontSize: '0.8125rem', color: 'var(--text-secondary)' }}>
                                    <i className="fa-solid fa-info-circle" style={{ color: 'var(--info)', marginRight: '0.5rem' }}></i>กรอกอีเมลทีละ 1 คน สูงสุด 5 คนต่อบ้าน
                                </div>
                                <div className="modal-actions">
                                    <button className="btn btn-secondary" onClick={() => setShowAddMemberModal(false)}><i className="fa-solid fa-xmark"></i> ปิด</button>
                                    <button className="btn btn-primary" onClick={handleAddMember} disabled={parseInt(selectedHead.memberCount || 0) >= 5}><i className="fa-solid fa-plus"></i> เพิ่มสมาชิก</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Detail Modal */}
                    {showDetailModal && familyHeadDetail && (
                        <div className="modal-overlay" onClick={() => setShowDetailModal(false)}>
                            <div className="modal" onClick={e => e.stopPropagation()}>
                                <h2><i className="fa-solid fa-house-chimney-user"></i> รายละเอียดหัวบ้าน</h2>
                                <div className="neo-card" style={{ marginBottom: '1rem' }}>
                                    <h3 style={{ marginBottom: '1rem', fontSize: '1rem', fontWeight: 600 }}><i className="fa-solid fa-circle-info" style={{ color: 'var(--info)', marginRight: '0.5rem' }}></i>ข้อมูลหัวบ้าน</h3>
                                    <table style={{ width: '100%' }}>
                                        <tbody>
                                            <tr><td style={{ fontWeight: 600, color: 'var(--text-secondary)', width: '120px', padding: '0.5rem 0', fontSize: '0.8125rem' }}>อีเมล</td><td className="font-semibold">{familyHeadDetail.email}</td></tr>
                                            <tr><td style={{ fontWeight: 600, color: 'var(--text-secondary)', padding: '0.5rem 0', fontSize: '0.8125rem' }}>ชื่อบัญชี</td><td>{familyHeadDetail.accountName || '-'}</td></tr>
                                            <tr><td style={{ fontWeight: 600, color: 'var(--text-secondary)', padding: '0.5rem 0', fontSize: '0.8125rem' }}>ร้านค้า</td><td><span className="badge badge-neutral">{familyHeadDetail.storeName}</span></td></tr>
                                            <tr><td style={{ fontWeight: 600, color: 'var(--text-secondary)', padding: '0.5rem 0', fontSize: '0.8125rem' }}>จำนวนสมาชิก</td><td><span className="badge badge-success">{familyHeadDetail.memberEmailsList?.length || 0}/5 คน</span></td></tr>
                                        </tbody>
                                    </table>
                                </div>
                                <div className="neo-card">
                                    <h3 style={{ marginBottom: '1rem', fontSize: '1rem', fontWeight: 600, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                        <span><i className="fa-solid fa-user-group" style={{ color: 'var(--info)', marginRight: '0.5rem' }}></i>สมาชิกในบ้าน</span>
                                        <button className="btn btn-primary btn-sm" onClick={() => { setShowDetailModal(false); setTimeout(() => openAddMember(selectedHead), 300); }} disabled={(familyHeadDetail.memberEmailsList?.length || 0) >= 5}>
                                            <i className="fa-solid fa-plus"></i> เพิ่ม
                                        </button>
                                    </h3>
                                    {familyHeadDetail.memberEmailsList && familyHeadDetail.memberEmailsList.length > 0 ? (
                                        <div style={{ display: 'flex', flexDirection: 'column', gap: '0.5rem' }}>
                                            {familyHeadDetail.memberEmailsList.map((email, idx) => (
                                                <div key={idx} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '0.75rem 1rem', background: 'var(--bg-tertiary)', borderRadius: 'var(--radius-md)', border: '1px solid var(--border-color)' }}>
                                                    <div style={{ display: 'flex', alignItems: 'center', gap: '0.625rem' }}>
                                                        <div style={{ width: '2rem', height: '2rem', borderRadius: '50%', background: 'var(--active-bg)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '0.75rem', fontWeight: 600, color: 'var(--accent)', flexShrink: 0 }}>{email.charAt(0).toUpperCase()}</div>
                                                        <div><div style={{ fontWeight: 500, fontSize: '0.875rem' }}>{email}</div><div className="text-xs text-muted">สมาชิกคนที่ {idx + 1}</div></div>
                                                    </div>
                                                    <button className="btn btn-danger btn-sm" onClick={() => handleRemoveMember(email)} title="ลบสมาชิก"><i className="fa-solid fa-user-minus"></i></button>
                                                </div>
                                            ))}
                                        </div>
                                    ) : (
                                        <div className="empty-state" style={{ padding: '2rem 1rem' }}><i className="fa-solid fa-users-slash" style={{ fontSize: '2rem' }}></i><p className="text-sm">ไม่มีสมาชิกในบ้านนี้</p></div>
                                    )}
                                    {(familyHeadDetail.memberEmailsList?.length || 0) < 5 && (
                                        <div style={{ marginTop: '1rem' }}><div style={{ padding: '0.625rem 0.875rem', background: 'var(--info-light)', borderRadius: 'var(--radius-md)', fontSize: '0.75rem', color: 'var(--text-secondary)' }}><i className="fa-solid fa-info-circle" style={{ color: 'var(--info)', marginRight: '0.375rem' }}></i>สามารถเพิ่มสมาชิกได้อีก {5 - (familyHeadDetail.memberEmailsList?.length || 0)} คน</div></div>
                                    )}
                                </div>
                                <div className="modal-actions"><button className="btn btn-secondary" onClick={() => setShowDetailModal(false)}><i className="fa-solid fa-xmark"></i> ปิด</button></div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ==================== LINE USERS PAGE (NEW) ====================
        const LineUsersPage = () => {
            const { user, callAPI, showToast } = useApp();
            const [users, setUsers] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedUser, setSelectedUser] = useState(null);
            const [showDetail, setShowDetail] = useState(false);
            const [linkedEmails, setLinkedEmails] = useState([]);
            const [newEmail, setNewEmail] = useState('');

            const isAdmin = user?.rank === 1;

            const fetchUsers = useCallback(async () => {
                if (!isAdmin) return;
                setLoading(true);
                try {
                    const data = await callAPI('getLineUsers');
                    setUsers(data.users || []);
                } catch (e) { }
                setLoading(false);
            }, [callAPI, isAdmin]);

            useEffect(() => { fetchUsers(); }, [fetchUsers]);

            const fetchLinkedEmails = async (userId) => {
                try {
                    const data = await callAPI('getLinkedEmails', { userId });
                    setLinkedEmails(data.emails);
                } catch (e) { }
            };

            const openDetail = (u) => {
                setSelectedUser(u);
                fetchLinkedEmails(u.userId);
                setShowDetail(true);
            };

            const handleLinkEmail = async () => {
                if (!newEmail.trim()) return;
                try {
                    await callAPI('linkEmailToUser', { userId: selectedUser.userId, email: newEmail.trim() });
                    showToast('เชื่อมอีเมลสำเร็จ', 'success');
                    setNewEmail('');
                    fetchLinkedEmails(selectedUser.userId);
                } catch (e) {
                    Swal.fire({ ...getSwalTheme(), icon: 'error', title: 'ผิดพลาด', text: e.message });
                }
            };

            const handleUnlink = async (linkId) => {
                try {
                    await callAPI('unlinkEmail', { linkId });
                    showToast('ลบการเชื่อมแล้ว', 'success');
                    fetchLinkedEmails(selectedUser.userId);
                } catch (e) {
                    Swal.fire({ ...getSwalTheme(), icon: 'error', title: 'ผิดพลาด', text: e.message });
                }
            };

            const handleUpdateUser = async (field, value) => {
                try {
                    await callAPI('updateLineUser', { userId: selectedUser.userId, [field]: value });
                    showToast('อัปเดตสำเร็จ', 'success');
                    setUsers(prev => prev.map(u => u.userId === selectedUser.userId ? { ...u, [field]: value } : u));
                } catch (e) {
                    Swal.fire({ ...getSwalTheme(), icon: 'error', title: 'ผิดพลาด', text: e.message });
                }
            };

            const handleDeleteUser = async () => {
                const result = await Swal.fire({
                    ...getSwalTheme(),
                    title: 'ยืนยันการลบผู้ใช้ LINE',
                    text: `คุณต้องการลบผู้ใช้ ${selectedUser.displayName}?`,
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonText: 'ลบ',
                    cancelButtonText: 'ยกเลิก'
                });
                if (!result.isConfirmed) return;
                try {
                    await callAPI('deleteLineUser', { userId: selectedUser.userId });
                    showToast('ลบผู้ใช้สำเร็จ', 'success');
                    setShowDetail(false);
                    fetchUsers();
                } catch (e) {
                    Swal.fire({ ...getSwalTheme(), icon: 'error', title: 'ผิดพลาด', text: e.message });
                }
            };

            if (!isAdmin) {
                return <div className="glass-card"><div className="empty-state"><i className="fa-solid fa-lock"></i><p>คุณไม่มีสิทธิ์เข้าถึงหน้านี้</p></div></div>;
            }

            return (
                <div>
                    <div className="top-bar">
                        <h1 className="page-title"><i className="fa-solid fa-users-line"></i> ผู้ใช้ LINE</h1>
                        <span className="badge badge-info">{users.length} ผู้ใช้</span>
                    </div>

                    {loading ? (
                        <div className="glass-card"><div className="loading-spinner"><div className="spinner"></div></div></div>
                    ) : (
                        <div className="glass-card">
                            <div className="table-wrapper">
                                <table>
                                    <thead><tr><th>ชื่อ</th><th>LINE User ID</th><th>อีเมลที่เชื่อม</th><th>สถานะ</th><th>การโต้ตอบ</th><th>จัดการ</th></tr></thead>
                                    <tbody>
                                        {users.length === 0 ? (
                                            <tr><td colSpan="6"><div className="empty-state">ไม่มีข้อมูล</div></td></tr>
                                        ) : (
                                            users.map((u, i) => (
                                                <tr key={i}>
                                                    <td>
                                                        <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                                                            <img src={u.pictureUrl} style={{ width: 24, height: 24, borderRadius: '50%' }} onError={(e) => { e.target.style.display = 'none'; }} />
                                                            <span className="font-semibold">{u.displayName || 'Unknown'}</span>
                                                        </div>
                                                    </td>
                                                    <td className="font-mono text-xs" style={{ maxWidth: '120px', overflow: 'hidden', textOverflow: 'ellipsis' }}>{u.userId}</td>
                                                    <td><span className="badge badge-info">{u.emailCount || 0} อีเมล</span></td>
                                                    <td><span className={`badge ${u.status === 'active' ? 'badge-success' : 'badge-danger'}`}>{u.status}</span></td>
                                                    <td className="text-sm">{u.interactionCount || 0} ครั้ง</td>
                                                    <td>
                                                        <button className="btn btn-secondary btn-xs" onClick={() => openDetail(u)}>
                                                            <i className="fa-solid fa-edit"></i> จัดการ
                                                        </button>
                                                    </td>
                                                </tr>
                                            ))
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}

                    {/* Modal รายละเอียดและการจัดการ */}
                    {showDetail && selectedUser && (
                        <div className="modal-overlay" onClick={() => setShowDetail(false)}>
                            <div className="modal" onClick={e => e.stopPropagation()}>
                                <h2><i className="fa-solid fa-user-gear"></i> จัดการผู้ใช้ LINE</h2>
                                <div className="neo-card" style={{ marginBottom: '1rem' }}>
                                    <div className="input-group">
                                        <label>ชื่อที่แสดง</label>
                                        <div style={{ display: 'flex', gap: '0.5rem' }}>
                                            <input className="input-field" defaultValue={selectedUser.displayName}
                                                onBlur={(e) => handleUpdateUser('displayName', e.target.value)} />
                                        </div>
                                    </div>
                                    <div className="input-group">
                                        <label>สถานะ</label>
                                        <select className="input-field" defaultValue={selectedUser.status}
                                            onChange={(e) => handleUpdateUser('status', e.target.value)}>
                                            <option value="active">Active</option>
                                            <option value="inactive">Inactive</option>
                                        </select>
                                    </div>
                                    <button className="btn btn-danger btn-sm" onClick={handleDeleteUser}>
                                        <i className="fa-solid fa-trash"></i> ลบผู้ใช้
                                    </button>
                                </div>

                                <h3><i className="fa-solid fa-envelope"></i> อีเมลที่เชื่อม ({linkedEmails.length})</h3>
                                <div className="neo-card" style={{ marginTop: '0.5rem' }}>
                                    <div style={{ display: 'flex', gap: '0.5rem', marginBottom: '0.75rem' }}>
                                        <input className="input-field" placeholder="เพิ่มอีเมลใหม่" value={newEmail}
                                            onChange={e => setNewEmail(e.target.value)}
                                            onKeyDown={e => e.key === 'Enter' && handleLinkEmail()} />
                                        <button className="btn btn-primary btn-sm" onClick={handleLinkEmail}><i className="fa-solid fa-plus"></i></button>
                                    </div>
                                    {linkedEmails.length === 0 ? (
                                        <p className="text-muted text-sm">ยังไม่มีอีเมลเชื่อม</p>
                                    ) : (
                                        linkedEmails.map((l, idx) => (
                                            <div key={idx} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '0.5rem', borderBottom: '1px solid var(--border-color)' }}>
                                                <span className="text-sm">{l.email}</span>
                                                <button className="btn btn-danger btn-xs" onClick={() => handleUnlink(l.id)}>
                                                    <i className="fa-solid fa-trash-can"></i>
                                                </button>
                                            </div>
                                        ))
                                    )}
                                </div>
                                <div className="modal-actions">
                                    <button className="btn btn-secondary" onClick={() => setShowDetail(false)}>ปิด</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ==================== MAIN APP ====================
        const App = () => {
            const { user, theme, loading, currentPage, sidebarOpen, setSidebarOpen, toggleTheme, setCurrentPage } = useApp();

            if (loading) return <LoadingScreen />;

            if (!user) {
                return (
                    <div data-theme={theme}>
                        <LoginPage />
                        <Toast />
                        <DebugPanel />
                        <button className="theme-toggle" onClick={toggleTheme} title="เปลี่ยนธีม">
                            <i className={`fa-solid fa-${theme === 'dark' ? 'sun' : 'มูน'}`}></i>
                        </button>
                    </div>
                );
            }

            const renderPage = () => {
                switch (currentPage) {
                    case 'dashboard': return <Dashboard />;
                    case 'customers': return <CustomersPage />;
                    case 'family': return <FamilyHeadsPage />;
                    case 'check': return <CheckPage />;
                    case 'history': return <HistoryPage />;
                    case 'profile': return <ProfilePage />;
                    case 'users': return user.rank === 1 ? <UsersPage /> : <Dashboard />;
                    case 'line_users': return <LineUsersPage />;
                    default: return <Dashboard />;
                }
            };

            return (
                <div data-theme={theme}>
                    <div className="app-container">
                        {sidebarOpen && (
                            <div onClick={() => setSidebarOpen(false)} style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.5)', backdropFilter: 'blur(2px)', zIndex: 99 }} />
                        )}
                        <Sidebar />
                        <main className="main-content">
                            <button className="mobile-menu-btn" onClick={() => setSidebarOpen(true)}>
                                <i className="fa-solid fa-bars"></i>
                            </button>
                            {renderPage()}
                        </main>
                        <BottomNav />
                    </div>
                    <Toast />
                    <DebugPanel />
                    <button className="theme-toggle" onClick={toggleTheme} title="เปลี่ยนธีม">
                        <i className={`fa-solid fa-${theme === 'dark' ? 'sun' : 'moon'}`}></i>
                    </button>
                </div>
            );
        };

        // ==================== RENDER ====================
        addDebugLog('=== Starting React App ===', 'info');
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <AppProvider>
                <App />
            </AppProvider>
        );
        addDebugLog('=== React App Rendered ===', 'success');
    </script>
</body>

</html>
